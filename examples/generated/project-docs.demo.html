has only three layers:\n\n```text\nConfig file\n  -\u003e Python build script\n  -\u003e self-contained HTML reader\n```\n\nThe config decides where to read from, how to sort files, UI labels, and review options.\n\nThe Python script scans files, renders Markdown/TXT, and generates HTML.\n\nThe HTML reader handles browser-side reading, filtering, navigation, reviewing, and exporting.\n\n## Embed in an Existing Project\n\nThis tool does not require users to adopt the full repository structure.\n\nFor a minimal integration into another project:\n\n```text\ncopy build_reader.py\ncopy or create workspace.config.md\npoint source_dir to your md/txt folder\npoint output to your output folder\nrun python build_reader.py workspace.config.md\n```\n\nIf you do not need DOCX conversion, you do not need to copy `tools/convert_docs.py`.\n\nIf you do not need local HTTP preview, you do not need to copy `serve_reader.py`.\n\nRecommended embedded workflow:\n\n```text\nfiles from any source\n  -\u003e package as reader.html\n  -\u003e human review produces review.md\n  -\u003e AI edits or generates a new version based on review.md\n  -\u003e rebuild reader.html to inspect the result\n```\n\n## Common Customization Points\n\n### Change Source Folder\n\nEdit the config file:\n\n```yaml\nsource_dir: ./examples/basic/drafts\nrecursive: true\ninclude:\n  - \"*.md\"\n  - \"*.txt\"\nexclude:\n  - \"*private*\"\n```\n\n`source_dir` must stay inside the folder containing the config file.\n\n### Change Output Path\n\n```yaml\noutput: ./output/reader.html\noverwrite: false\n```\n\nWhen `overwrite: false` and the target already exists, the script writes a timestamped file instead.\n\n### Change UI Language\n\n```yaml\nlocale: zh-CN\n```\n\nOr:\n\n```yaml\nlocale: en\n```\n\nYou can also override individual strings with `labels:`.\n\n### Change Review Actions and Targets\n\n```yaml\nreview:\n  enabled: true\n  actions:\n    - revise\n    - summarize\n    - extract\n    - register\n  targets:\n    - source paragraph\n    - review queue\n    - notes\n    - todo list\n```\n\nThe program does not need to interpret these fields as complex enums. They are exported into `review.md` for users or AI tools to understand.\n\n### Change TXT Paragraph Mode\n\n```yaml\ntext:\n  paragraph_mode: line\n```\n\nOptions:\n\n- `line`: each non-empty line becomes a reviewable paragraph.\n- `blank_line`: blank lines split paragraphs.\n\n## Converter Extensions\n\nThe core reader only commits to `.md` / `.txt`.\n\nFor more formats, add independent converters:\n\n```text\nsource.docx\n  -\u003e tools/convert_docs.py\n  -\u003e converted/source.docx.md\n  -\u003e build_reader.py\n```\n\nDo not make the browser parse local Office/PDF files directly.\n\n## Rendering Rule Extensions\n\nMarkdown rendering rules can be extended in `build_reader.py`.\n\nPrefer to keep:\n\n- HTML output safe.\n- Links disabled by default.\n- Complex structures falling back to readable text.\n- One bad file not breaking the whole project.\n\n## Review Export Extensions\n\nThe exported `review.md` format can be adapted for team workflows.\n\nThe main logic lives in the embedded JavaScript `reviewMarkdown()` function.\n\nRecommended fields to keep:\n\n- File path.\n- Title.\n- Paragraph number.\n- Action.\n- Target.\n- Original quote.\n- User instruction.\n- Created time.\n\nThese fields help AI tools or humans locate the context later.\n\n## Boundaries Not Recommended for First Customizations\n\nAvoid adding these to the default path in a first customization pass:\n\n- Browser write-back to source files.\n- Automatic AI API calls.\n- Automatic merging of AI edits.\n- Background service dependency.\n- npm frontend build chain.\n- Complex chart libraries.\n\nThese can be explored in separate branches, but they do not fit the default path of this small tool.\n\n## What a Good Custom Version Looks Like\n\nA good custom version should:\n\n- Still build with one command.\n- Still keep source files read-only.\n- Still validate the core path with the smoke test.\n- Explain its changes in README.\n- Include examples that help strangers understand the use case quickly.\n"}, {"id": "chapter-006", "title": "自定义指南", "file_name": "03-customization-guide.zh-CN.md", "relative_path": "docs/03-customization-guide.zh-CN.md", "path": "docs/03-customization-guide.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "03", "ext": ".md", "word_count": 901, "modified_time": "2026-07-02T01:08:16", "content_html": "\u003ch1\u003e自定义指南\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文件说明后来者可以怎样修改这个项目，以及修改时应避免破坏哪些边界。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e03-customization-guide.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e最小心智模型\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003e这个项目只有三层：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e配置文件\n  -\u0026gt; Python 构建脚本\n  -\u0026gt; 自包含 HTML 阅读器\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e配置文件决定读哪里、怎么排序、界面文案和批复选项。\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003ePython 脚本负责扫描文件、转换 Markdown/TXT、生成 HTML。\u003c/p\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eHTML 阅读器负责浏览器里的阅读、筛选、翻页、批复和导出。\u003c/p\u003e\n\u003ch2\u003e嵌入到现有项目\u003c/h2\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003e这个工具不要求用户采用本仓库的完整目录结构。\u003c/p\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003e如果只是想把阅读器能力接入自己的项目，最小做法是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e复制 build_reader.py\n复制或新建 workspace.config.md\n把 source_dir 指向自己的 md/txt 文件夹\n把 output 指向自己的输出目录\n运行 python build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003e如果不需要 DOCX 转换器，就不必复制 \u003ccode\u003etools/convert_docs.py\u003c/code\u003e。\u003c/p\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003e如果不需要本地 HTTP 预览，也不必复制 \u003ccode\u003eserve_reader.py\u003c/code\u003e。\u003c/p\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003e嵌入后的推荐工作流是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e任意来源文件\n  -\u0026gt; 打包成 reader.html\n  -\u0026gt; 人审阅并产生 review.md\n  -\u0026gt; AI 根据 review.md 修改或生成新版本\n  -\u0026gt; 再次打包 reader.html 检查结果\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e常见自定义点\u003c/h2\u003e\n\u003ch3\u003e改源目录\u003c/h3\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003e在配置文件中修改：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003esource_dir: ./examples/basic/drafts\nrecursive: true\ninclude:\n  - \u0026quot;*.md\u0026quot;\n  - \u0026quot;*.txt\u0026quot;\nexclude:\n  - \u0026quot;*private*\u0026quot;\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"13\" data-block-type=\"paragraph\"\u003e\u003ccode\u003esource_dir\u003c/code\u003e 必须位于配置文件所在目录之内。\u003c/p\u003e\n\u003ch3\u003e改输出路径\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput: ./output/reader.html\noverwrite: false\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"14\" data-block-type=\"paragraph\"\u003e当 \u003ccode\u003eoverwrite: false\u003c/code\u003e 且目标文件已存在时，脚本会生成带时间戳的新文件。\u003c/p\u003e\n\u003ch3\u003e改界面语言\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003elocale: zh-CN\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"15\" data-block-type=\"paragraph\"\u003e或：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003elocale: en\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"16\" data-block-type=\"paragraph\"\u003e也可以用 \u003ccode\u003elabels:\u003c/code\u003e 覆盖单个文案。\u003c/p\u003e\n\u003ch3\u003e改批复动作和目标\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ereview:\n  enabled: true\n  actions:\n    - 修改\n    - 总结\n    - 提取\n    - 登记\n  targets:\n    - 原文段落\n    - 审阅队列\n    - 笔记\n    - 待办清单\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003e这些字段不需要程序理解成复杂枚举。它们最终会进入导出的 \u003ccode\u003ereview.md\u003c/code\u003e，供用户或 AI 理解。\u003c/p\u003e\n\u003ch3\u003e改 TXT 分段方式\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003etext:\n  paragraph_mode: line\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"18\" data-block-type=\"paragraph\"\u003e可选：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003eline\u003c/code\u003e：一行一个可批复段落。\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e\u003ccode\u003eblank_line\u003c/code\u003e：空行分段。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e转换器扩展\u003c/h2\u003e\n\u003cp data-block-index=\"21\" data-block-type=\"paragraph\"\u003e核心阅读器只承诺 \u003ccode\u003e.md\u003c/code\u003e / \u003ccode\u003e.txt\u003c/code\u003e。\u003c/p\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003e如果要支持更多格式，建议增加独立转换器：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003esource.docx\n  -\u0026gt; tools/convert_docs.py\n  -\u0026gt; converted/source.docx.md\n  -\u0026gt; build_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"23\" data-block-type=\"paragraph\"\u003e不要让浏览器直接解析本地 Office/PDF 文件。\u003c/p\u003e\n\u003ch2\u003e渲染规则扩展\u003c/h2\u003e\n\u003cp data-block-index=\"24\" data-block-type=\"paragraph\"\u003e可以在 \u003ccode\u003ebuild_reader.py\u003c/code\u003e 中扩展 Markdown 渲染规则。\u003c/p\u003e\n\u003cp data-block-index=\"25\" data-block-type=\"paragraph\"\u003e建议优先保持：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e输出 HTML 安全。\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003e链接默认不激活。\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003e复杂结构失败时回退为可读文本。\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003e不让单个坏文件中断整个项目。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e审阅导出扩展\u003c/h2\u003e\n\u003cp data-block-index=\"30\" data-block-type=\"paragraph\"\u003e导出的 \u003ccode\u003ereview.md\u003c/code\u003e 可以被改成团队需要的格式。\u003c/p\u003e\n\u003cp data-block-index=\"31\" data-block-type=\"paragraph\"\u003e修改位置在 HTML 内嵌 JavaScript 的 \u003ccode\u003ereviewMarkdown()\u003c/code\u003e 逻辑。\u003c/p\u003e\n\u003cp data-block-index=\"32\" data-block-type=\"paragraph\"\u003e建议保留：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003e文件路径。\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e标题。\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e段落编号。\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e动作。\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e目标。\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e引用原文。\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003e用户批复。\u003c/li\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003e创建时间。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"41\" data-block-type=\"paragraph\"\u003e这些字段能让 AI 或人工后续处理更容易定位上下文。\u003c/p\u003e\n\u003ch2\u003e不建议改的边界\u003c/h2\u003e\n\u003cp data-block-index=\"42\" data-block-type=\"paragraph\"\u003e不建议在第一波自定义中加入：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"43\" data-block-type=\"list-item\"\u003e浏览器写回源文件。\u003c/li\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003e自动调用 AI API。\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003e自动合并 AI 修改。\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003e后台服务依赖。\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003enpm 前端构建链。\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e复杂图表库。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"49\" data-block-type=\"paragraph\"\u003e这些都可以另开分支探索，但不适合塞进这个小工具的默认路径。\u003c/p\u003e\n\u003ch2\u003e一个好的自定义版本应该是什么样\u003c/h2\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003e一个好的自定义版本应该：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003e仍然一条命令可构建。\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003e仍然不修改源文件。\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003e仍然能用 smoke test 验证核心路径。\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003eREADME 写清楚自己改了什么。\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003e示例文件能让陌生人快速理解用途。\u003c/li\u003e\u003c/ul\u003e", "content_text": "# 自定义指南\n\n本文件说明后来者可以怎样修改这个项目，以及修改时应避免破坏哪些边界。\n\n对应英文文件：`03-customization-guide.en.md`\n\n## 最小心智模型\n\n这个项目只有三层：\n\n```text\n配置文件\n  -\u003e Python 构建脚本\n  -\u003e 自包含 HTML 阅读器\n```\n\n配置文件决定读哪里、怎么排序、界面文案和批复选项。\n\nPython 脚本负责扫描文件、转换 Markdown/TXT、生成 HTML。\n\nHTML 阅读器负责浏览器里的阅读、筛选、翻页、批复和导出。\n\n## 嵌入到现有项目\n\n这个工具不要求用户采用本仓库的完整目录结构。\n\n如果只是想把阅读器能力接入自己的项目，最小做法是：\n\n```text\n复制 build_reader.py\n复制或新建 workspace.config.md\n把 source_dir 指向自己的 md/txt 文件夹\n把 output 指向自己的输出目录\n运行 python build_reader.py workspace.config.md\n```\n\n如果不需要 DOCX 转换器，就不必复制 `tools/convert_docs.py`。\n\n如果不需要本地 HTTP 预览，也不必复制 `serve_reader.py`。\n\n嵌入后的推荐工作流是：\n\n```text\n任意来源文件\n  -\u003e 打包成 reader.html\n  -\u003e 人审阅并产生 review.md\n  -\u003e AI 根据 review.md 修改或生成新版本\n  -\u003e 再次打包 reader.html 检查结果\n```\n\n## 常见自定义点\n\n### 改源目录\n\n在配置文件中修改：\n\n```yaml\nsource_dir: ./examples/basic/drafts\nrecursive: true\ninclude:\n  - \"*.md\"\n  - \"*.txt\"\nexclude:\n  - \"*private*\"\n```\n\n`source_dir` 必须位于配置文件所在目录之内。\n\n### 改输出路径\n\n```yaml\noutput: ./output/reader.html\noverwrite: false\n```\n\n当 `overwrite: false` 且目标文件已存在时，脚本会生成带时间戳的新文件。\n\n### 改界面语言\n\n```yaml\nlocale: zh-CN\n```\n\n或：\n\n```yaml\nlocale: en\n```\n\n也可以用 `labels:` 覆盖单个文案。\n\n### 改批复动作和目标\n\n```yaml\nreview:\n  enabled: true\n  actions:\n    - 修改\n    - 总结\n    - 提取\n    - 登记\n  targets:\n    - 原文段落\n    - 审阅队列\n    - 笔记\n    - 待办清单\n```\n\n这些字段不需要程序理解成复杂枚举。它们最终会进入导出的 `review.md`，供用户或 AI 理解。\n\n### 改 TXT 分段方式\n\n```yaml\ntext:\n  paragraph_mode: line\n```\n\n可选：\n\n- `line`：一行一个可批复段落。\n- `blank_line`：空行分段。\n\n## 转换器扩展\n\n核心阅读器只承诺 `.md` / `.txt`。\n\n如果要支持更多格式，建议增加独立转换器：\n\n```text\nsource.docx\n  -\u003e tools/convert_docs.py\n  -\u003e converted/source.docx.md\n  -\u003e build_reader.py\n```\n\n不要让浏览器直接解析本地 Office/PDF 文件。\n\n## 渲染规则扩展\n\n可以在 `build_reader.py` 中扩展 Markdown 渲染规则。\n\n建议优先保持：\n\n- 输出 HTML 安全。\n- 链接默认不激活。\n- 复杂结构失败时回退为可读文本。\n- 不让单个坏文件中断整个项目。\n\n## 审阅导出扩展\n\n导出的 `review.md` 可以被改成团队需要的格式。\n\n修改位置在 HTML 内嵌 JavaScript 的 `reviewMarkdown()` 逻辑。\n\n建议保留：\n\n- 文件路径。\n- 标题。\n- 段落编号。\n- 动作。\n- 目标。\n- 引用原文。\n- 用户批复。\n- 创建时间。\n\n这些字段能让 AI 或人工后续处理更容易定位上下文。\n\n## 不建议改的边界\n\n不建议在第一波自定义中加入：\n\n- 浏览器写回源文件。\n- 自动调用 AI API。\n- 自动合并 AI 修改。\n- 后台服务依赖。\n- npm 前端构建链。\n- 复杂图表库。\n\n这些都可以另开分支探索，但不适合塞进这个小工具的默认路径。\n\n## 一个好的自定义版本应该是什么样\n\n一个好的自定义版本应该：\n\n- 仍然一条命令可构建。\n- 仍然不修改源文件。\n- 仍然能用 smoke test 验证核心路径。\n- README 写清楚自己改了什么。\n- 示例文件能让陌生人快速理解用途。\n"}, {"id": "chapter-007", "title": "User Manual", "file_name": "04-user-manual.en.md", "relative_path": "docs/04-user-manual.en.md", "path": "docs/04-user-manual.en.md", "folder": "docs", "path_segments": ["docs"], "prefix": "04", "ext": ".md", "word_count": 794, "modified_time": "2026-07-02T03:10:35", "content_html": "\u003ch1\u003eUser Manual\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eThis file is for end users. It explains the reader interface, shortcuts, review board, and export flow.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eChinese counterpart: \u003ccode\u003e04-user-manual.zh-CN.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003eBuild the Reader\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003eRun this command in the project folder:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003eGenerated file:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003eYou can also start the optional local preview server:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython serve_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eDefault address:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ehttp://127.0.0.1:8766/output/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eInterface Layout\u003c/h2\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003eThe reader has three main columns:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003eLeft: contents panel.\u003c/li\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003eCenter: reading area.\u003c/li\u003e\u003cli data-block-index=\"10\" data-block-type=\"list-item\"\u003eRight: review board.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003eThe contents panel and review board can both be collapsed. Their widths can be resized by dragging and are saved in local browser state.\u003c/p\u003e\n\u003ch2\u003eTop Toolbar\u003c/h2\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003eThe top toolbar contains:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003eSearch box.\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eFile type filter.\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003eAscending/descending order toggle.\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003eFont size controls.\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003eReading width controls.\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003eDark/light mode toggle.\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003eReset layout button.\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003eContents panel toggle.\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003eReview board toggle.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003eSearch matches:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003eTitle.\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003eFile name.\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003eRelative path.\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003eBody content.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"27\" data-block-type=\"paragraph\"\u003eFiltered results become a temporary reading list. Previous and next navigation only move within the current filtered result set.\u003c/p\u003e\n\u003ch2\u003eKeyboard Shortcuts\u003c/h2\u003e\n\u003cp data-block-index=\"28\" data-block-type=\"paragraph\"\u003eCurrent shortcuts:\u003c/p\u003e\n\u003cdiv class=\"table-wrap\" data-table-index=\"1\"\u003e\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eShortcut\u003c/th\u003e\u003cth\u003eAction\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eA\u003c/code\u003e\u003c/td\u003e\u003ctd\u003ePrevious file\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e←\u003c/code\u003e\u003c/td\u003e\u003ctd\u003ePrevious file\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eD\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eNext file\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e→\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eNext file\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eR\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eOpen review dialog\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003cp data-block-index=\"29\" data-block-type=\"paragraph\"\u003eWhen focus is inside an input, select, or textarea, these shortcuts do not trigger navigation or the review dialog.\u003c/p\u003e\n\u003cp data-block-index=\"30\" data-block-type=\"paragraph\"\u003eIn browsers such as Microsoft Edge, selecting text may show the browser\u0026#x27;s own mini menu. That menu can cover the page or capture key input, so pressing \u003ccode\u003eR\u003c/code\u003e after selecting text may not always open the review dialog. Firefox usually does not show this issue. If it happens, click the floating review button or the review button beside a paragraph.\u003c/p\u003e\n\u003ch2\u003eReading Settings\u003c/h2\u003e\n\u003cp data-block-index=\"31\" data-block-type=\"paragraph\"\u003eYou can adjust:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003eFont size.\u003c/li\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003eReading width.\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003eDark/light mode.\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003eContents panel width.\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003eReview board width.\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003eWhether the contents panel and review board are collapsed.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"38\" data-block-type=\"paragraph\"\u003eThese settings are saved in browser \u003ccode\u003elocalStorage\u003c/code\u003e. They are restored after refresh.\u003c/p\u003e\n\u003cp data-block-index=\"39\" data-block-type=\"paragraph\"\u003eThe reset layout button resets reading layout preferences but does not delete review notes.\u003c/p\u003e\n\u003ch2\u003eAdd Review Notes\u003c/h2\u003e\n\u003cp data-block-index=\"40\" data-block-type=\"paragraph\"\u003eThere are two ways to add a review note:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003eSelect text and click the floating review button, or press \u003ccode\u003eR\u003c/code\u003e.\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003eClick the review button beside a paragraph.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003eIf text is selected, the review dialog uses the selected text as the quote.\u003c/p\u003e\n\u003cp data-block-index=\"44\" data-block-type=\"paragraph\"\u003eIf no text is selected, the review dialog uses the current paragraph.\u003c/p\u003e\n\u003cp data-block-index=\"45\" data-block-type=\"paragraph\"\u003eThe review dialog contains:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003eOriginal quote.\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003eAction.\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003eTarget.\u003c/li\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003eUser instruction.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003eActions and targets come from the config file and can be adapted to your workflow.\u003c/p\u003e\n\u003ch2\u003eReview Board\u003c/h2\u003e\n\u003cp data-block-index=\"51\" data-block-type=\"paragraph\"\u003eThe review board shows all current review notes.\u003c/p\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003eIt supports:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003eEditing action.\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003eEditing target.\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003eEditing user instruction.\u003c/li\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003eDeleting one review note.\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003eClearing all review notes.\u003c/li\u003e\u003cli data-block-index=\"58\" data-block-type=\"list-item\"\u003eCopying \u003ccode\u003ereview.md\u003c/code\u003e.\u003c/li\u003e\u003cli data-block-index=\"59\" data-block-type=\"list-item\"\u003eDownloading \u003ccode\u003ereview.md\u003c/code\u003e.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"60\" data-block-type=\"paragraph\"\u003eWhen editing a review note in the board, the original quote is not modified.\u003c/p\u003e\n\u003ch2\u003eExported review.md\u003c/h2\u003e\n\u003cp data-block-index=\"61\" data-block-type=\"paragraph\"\u003eThe exported \u003ccode\u003ereview.md\u003c/code\u003e is grouped by file.\u003c/p\u003e\n\u003cp data-block-index=\"62\" data-block-type=\"paragraph\"\u003eEach review note usually includes:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003eFile path.\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003eTitle.\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003eParagraph position.\u003c/li\u003e\u003cli data-block-index=\"66\" data-block-type=\"list-item\"\u003eAction.\u003c/li\u003e\u003cli data-block-index=\"67\" data-block-type=\"list-item\"\u003eTarget.\u003c/li\u003e\u003cli data-block-index=\"68\" data-block-type=\"list-item\"\u003eTime.\u003c/li\u003e\u003cli data-block-index=\"69\" data-block-type=\"list-item\"\u003eOriginal quote.\u003c/li\u003e\u003cli data-block-index=\"70\" data-block-type=\"list-item\"\u003eUser instruction.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"71\" data-block-type=\"paragraph\"\u003eThis file can be given to AI or used as a manual editing checklist.\u003c/p\u003e\n\u003cp data-block-index=\"72\" data-block-type=\"paragraph\"\u003eRecommended usage:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eCopy or download review.md\n  -\u0026gt; paste it into AI, or provide it to AI as a file\n  -\u0026gt; ask AI to propose edits or generate a revised version\n  -\u0026gt; confirm the result before editing source files\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"73\" data-block-type=\"paragraph\"\u003eThe reader does not perform these edits automatically.\u003c/p\u003e\n\u003cp data-block-index=\"74\" data-block-type=\"paragraph\"\u003eThe full loop can be:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003efiles from any source\n  -\u0026gt; package reader.html\n  -\u0026gt; human reading and review\n  -\u0026gt; export review.md\n  -\u0026gt; AI edits source files or generates a new version based on review notes\n  -\u0026gt; package reader.html again\n  -\u0026gt; human acceptance\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eRepackage review.md\u003c/h2\u003e\n\u003cp data-block-index=\"75\" data-block-type=\"paragraph\"\u003eDownloaded \u003ccode\u003ereview.md\u003c/code\u003e files can be placed in a folder and packaged by the reader again.\u003c/p\u003e\n\u003cp data-block-index=\"76\" data-block-type=\"paragraph\"\u003eThis is useful for:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"77\" data-block-type=\"list-item\"\u003eRereading review notes.\u003c/li\u003e\u003cli data-block-index=\"78\" data-block-type=\"list-item\"\u003eArchiving review notes.\u003c/li\u003e\u003cli data-block-index=\"79\" data-block-type=\"list-item\"\u003eSecond-pass review.\u003c/li\u003e\u003cli data-block-index=\"80\" data-block-type=\"list-item\"\u003eCombining multiple review files into one searchable reader.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"81\" data-block-type=\"paragraph\"\u003eThis flow does not promise reversible structure. It only promises that the file remains readable, searchable, and reviewable as normal Markdown.\u003c/p\u003e\n\u003ch2\u003eLinks and Images\u003c/h2\u003e\n\u003cp data-block-index=\"82\" data-block-type=\"paragraph\"\u003eMarkdown links are disabled by default.\u003c/p\u003e\n\u003cp data-block-index=\"83\" data-block-type=\"paragraph\"\u003eThe reader shows:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e(Unknown link, check the source file)\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"84\" data-block-type=\"paragraph\"\u003eThis prevents external or AI-generated Markdown from activating untrusted links in the browser.\u003c/p\u003e\n\u003cp data-block-index=\"85\" data-block-type=\"paragraph\"\u003eImages have basic display support. Data URL images generated by converters can enter the reader, but image extraction quality from complex documents depends on the converter.\u003c/p\u003e\n\u003ch2\u003eFAQ\u003c/h2\u003e\n\u003ch3\u003eWhy does the page not change after I add source files?\u003c/h3\u003e\n\u003cp data-block-index=\"86\" data-block-type=\"paragraph\"\u003eRun the build command again.\u003c/p\u003e\n\u003cp data-block-index=\"87\" data-block-type=\"paragraph\"\u003eThe reader HTML is a packaged artifact. It does not watch the folder automatically.\u003c/p\u003e\n\u003ch3\u003eWhy can the browser not read the current folder directly?\u003c/h3\u003e\n\u003cp data-block-index=\"88\" data-block-type=\"paragraph\"\u003eBrowsers cannot silently scan local folders because of security restrictions.\u003c/p\u003e\n\u003cp data-block-index=\"89\" data-block-type=\"paragraph\"\u003eThe current design is:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ePython reads local files\n  -\u0026gt; HTML handles reading and interaction\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch3\u003eWhy not edit source files directly?\u003c/h3\u003e\n\u003cp data-block-index=\"90\" data-block-type=\"paragraph\"\u003eFor safety and control.\u003c/p\u003e\n\u003cp data-block-index=\"91\" data-block-type=\"paragraph\"\u003eThe reader only creates side-channel review files. Source edits are left to the user or a later AI-assisted workflow.\u003c/p\u003e", "content_text": "# User Manual\n\nThis file is for end users. It explains the reader interface, shortcuts, review board, and export flow.\n\nChinese counterpart: `04-user-manual.zh-CN.md`\n\n## Build the Reader\n\nRun this command in the project folder:\n\n```powershell\npython build_reader.py workspace.config.md\n```\n\nGenerated file:\n\n```text\noutput/reader.html\n```\n\nYou can also start the optional local preview server:\n\n```powershell\npython serve_reader.py\n```\n\nDefault address:\n\n```text\nhttp://127.0.0.1:8766/output/reader.html\n```\n\n## Interface Layout\n\nThe reader has three main columns:\n\n- Left: contents panel.\n- Center: reading area.\n- Right: review board.\n\nThe contents panel and review board can both be collapsed. Their widths can be resized by dragging and are saved in local browser state.\n\n## Top Toolbar\n\nThe top toolbar contains:\n\n- Search box.\n- File type filter.\n- Ascending/descending order toggle.\n- Font size controls.\n- Reading width controls.\n- Dark/light mode toggle.\n- Reset layout button.\n- Contents panel toggle.\n- Review board toggle.\n\nSearch matches:\n\n- Title.\n- File name.\n- Relative path.\n- Body content.\n\nFiltered results become a temporary reading list. Previous and next navigation only move within the current filtered result set.\n\n## Keyboard Shortcuts\n\nCurrent shortcuts:\n\n| Shortcut | Action |\n| --- | --- |\n| `A` | Previous file |\n| `←` | Previous file |\n| `D` | Next file |\n| `→` | Next file |\n| `R` | Open review dialog |\n\nWhen focus is inside an input, select, or textarea, these shortcuts do not trigger navigation or the review dialog.\n\nIn browsers such as Microsoft Edge, selecting text may show the browser's own mini menu. That menu can cover the page or capture key input, so pressing `R` after selecting text may not always open the review dialog. Firefox usually does not show this issue. If it happens, click the floating review button or the review button beside a paragraph.\n\n## Reading Settings\n\nYou can adjust:\n\n- Font size.\n- Reading width.\n- Dark/light mode.\n- Contents panel width.\n- Review board width.\n- Whether the contents panel and review board are collapsed.\n\nThese settings are saved in browser `localStorage`. They are restored after refresh.\n\nThe reset layout button resets reading layout preferences but does not delete review notes.\n\n## Add Review Notes\n\nThere are two ways to add a review note:\n\n- Select text and click the floating review button, or press `R`.\n- Click the review button beside a paragraph.\n\nIf text is selected, the review dialog uses the selected text as the quote.\n\nIf no text is selected, the review dialog uses the current paragraph.\n\nThe review dialog contains:\n\n- Original quote.\n- Action.\n- Target.\n- User instruction.\n\nActions and targets come from the config file and can be adapted to your workflow.\n\n## Review Board\n\nThe review board shows all current review notes.\n\nIt supports:\n\n- Editing action.\n- Editing target.\n- Editing user instruction.\n- Deleting one review note.\n- Clearing all review notes.\n- Copying `review.md`.\n- Downloading `review.md`.\n\nWhen editing a review note in the board, the original quote is not modified.\n\n## Exported review.md\n\nThe exported `review.md` is grouped by file.\n\nEach review note usually includes:\n\n- File path.\n- Title.\n- Paragraph position.\n- Action.\n- Target.\n- Time.\n- Original quote.\n- User instruction.\n\nThis file can be given to AI or used as a manual editing checklist.\n\nRecommended usage:\n\n```text\nCopy or download review.md\n  -\u003e paste it into AI, or provide it to AI as a file\n  -\u003e ask AI to propose edits or generate a revised version\n  -\u003e confirm the result before editing source files\n```\n\nThe reader does not perform these edits automatically.\n\nThe full loop can be:\n\n```text\nfiles from any source\n  -\u003e package reader.html\n  -\u003e human reading and review\n  -\u003e export review.md\n  -\u003e AI edits source files or generates a new version based on review notes\n  -\u003e package reader.html again\n  -\u003e human acceptance\n```\n\n## Repackage review.md\n\nDownloaded `review.md` files can be placed in a folder and packaged by the reader again.\n\nThis is useful for:\n\n- Rereading review notes.\n- Archiving review notes.\n- Second-pass review.\n- Combining multiple review files into one searchable reader.\n\nThis flow does not promise reversible structure. It only promises that the file remains readable, searchable, and reviewable as normal Markdown.\n\n## Links and Images\n\nMarkdown links are disabled by default.\n\nThe reader shows:\n\n```text\n(Unknown link, check the source file)\n```\n\nThis prevents external or AI-generated Markdown from activating untrusted links in the browser.\n\nImages have basic display support. Data URL images generated by converters can enter the reader, but image extraction quality from complex documents depends on the converter.\n\n## FAQ\n\n### Why does the page not change after I add source files?\n\nRun the build command again.\n\nThe reader HTML is a packaged artifact. It does not watch the folder automatically.\n\n### Why can the browser not read the current folder directly?\n\nBrowsers cannot silently scan local folders because of security restrictions.\n\nThe current design is:\n\n```text\nPython reads local files\n  -\u003e HTML handles reading and interaction\n```\n\n### Why not edit source files directly?\n\nFor safety and control.\n\nThe reader only creates side-channel review files. Source edits are left to the user or a later AI-assisted workflow.\n"}, {"id": "chapter-008", "title": "用户手册", "file_name": "04-user-manual.zh-CN.md", "relative_path": "docs/04-user-manual.zh-CN.md", "path": "docs/04-user-manual.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "04", "ext": ".md", "word_count": 1286, "modified_time": "2026-07-02T03:10:33", "content_html": "\u003ch1\u003e用户手册\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文件面向普通使用者，说明阅读器界面、快捷键、审阅板和导出流程。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e04-user-manual.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e生成阅读器\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003e在项目目录中运行：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e生成文件：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003e也可以启动本地预览服务：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython serve_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003e默认地址：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ehttp://127.0.0.1:8766/output/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e界面结构\u003c/h2\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003e阅读器主要分为三栏：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003e左侧：目录栏。\u003c/li\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003e中间：正文阅读区。\u003c/li\u003e\u003cli data-block-index=\"10\" data-block-type=\"list-item\"\u003e右侧：审阅板。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003e目录栏和审阅板都可以折叠。左右栏宽度可以拖拽调整，并会保存到浏览器本地状态。\u003c/p\u003e\n\u003ch2\u003e顶部工具栏\u003c/h2\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003e顶部工具栏包含：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003e搜索框。\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003e文件类型筛选。\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e正序/倒序切换。\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e字体大小调整。\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003e阅读宽度调整。\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e深色/浅色模式切换。\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e恢复默认布局按钮。\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e目录栏折叠按钮。\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e审阅板折叠按钮。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003e搜索会匹配：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003e标题。\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003e文件名。\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003e相对路径。\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e正文内容。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"27\" data-block-type=\"paragraph\"\u003e搜索后的结果会形成临时书单。上一篇和下一篇只在当前筛选结果中移动。\u003c/p\u003e\n\u003ch2\u003e快捷键\u003c/h2\u003e\n\u003cp data-block-index=\"28\" data-block-type=\"paragraph\"\u003e当前快捷键：\u003c/p\u003e\n\u003cdiv class=\"table-wrap\" data-table-index=\"1\"\u003e\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003e快捷键\u003c/th\u003e\u003cth\u003e功能\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eA\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e上一篇\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e←\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e上一篇\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eD\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e下一篇\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e→\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e下一篇\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eR\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e打开审阅窗口\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003cp data-block-index=\"29\" data-block-type=\"paragraph\"\u003e当光标位于输入框、下拉框或文本框中时，快捷键不会触发翻页或打开审阅窗口。\u003c/p\u003e\n\u003cp data-block-index=\"30\" data-block-type=\"paragraph\"\u003e在 Microsoft Edge 等浏览器中，选中文本后浏览器可能显示自己的迷你菜单。这个菜单有时会挡住页面或截获按键，导致 \u003ccode\u003eR\u003c/code\u003e 没有打开审阅窗口。Firefox 中通常不会出现这个问题。遇到这种情况时，直接点击页面中的浮动批复按钮，或点击段落旁的批复按钮。\u003c/p\u003e\n\u003ch2\u003e阅读设置\u003c/h2\u003e\n\u003cp data-block-index=\"31\" data-block-type=\"paragraph\"\u003e可以调整：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003e字体大小。\u003c/li\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003e阅读宽度。\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e深色/浅色模式。\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e左侧目录栏宽度。\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e右侧审阅板宽度。\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e目录栏和审阅板是否折叠。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"38\" data-block-type=\"paragraph\"\u003e这些设置会保存在浏览器 \u003ccode\u003elocalStorage\u003c/code\u003e 中。刷新页面后仍会恢复。\u003c/p\u003e\n\u003cp data-block-index=\"39\" data-block-type=\"paragraph\"\u003e恢复默认按钮会重置阅读布局相关设置，但不会删除批复。\u003c/p\u003e\n\u003ch2\u003e添加批复\u003c/h2\u003e\n\u003cp data-block-index=\"40\" data-block-type=\"paragraph\"\u003e可以用两种方式添加批复：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003e选中文本后点击浮动批复按钮，或按 \u003ccode\u003eR\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003e点击段落旁边的批复按钮。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003e如果选中了文本，审阅窗口会优先引用选中文本。\u003c/p\u003e\n\u003cp data-block-index=\"44\" data-block-type=\"paragraph\"\u003e如果没有选中文本，审阅窗口会引用当前段落。\u003c/p\u003e\n\u003cp data-block-index=\"45\" data-block-type=\"paragraph\"\u003e审阅窗口包含：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003e引用原文。\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003e动作。\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e目标。\u003c/li\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003e用户批复说明。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003e动作和目标来自配置文件，可以按自己的工作流修改。\u003c/p\u003e\n\u003ch2\u003e审阅板\u003c/h2\u003e\n\u003cp data-block-index=\"51\" data-block-type=\"paragraph\"\u003e审阅板会显示当前所有批复。\u003c/p\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003e支持：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003e编辑动作。\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003e编辑目标。\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003e编辑用户批复说明。\u003c/li\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003e删除单条批复。\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003e清空所有批复。\u003c/li\u003e\u003cli data-block-index=\"58\" data-block-type=\"list-item\"\u003e复制 \u003ccode\u003ereview.md\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"59\" data-block-type=\"list-item\"\u003e下载 \u003ccode\u003ereview.md\u003c/code\u003e。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"60\" data-block-type=\"paragraph\"\u003e编辑审阅板中的批复时，引用原文不会被修改。\u003c/p\u003e\n\u003ch2\u003e导出的 review.md\u003c/h2\u003e\n\u003cp data-block-index=\"61\" data-block-type=\"paragraph\"\u003e导出的 \u003ccode\u003ereview.md\u003c/code\u003e 按文件分组。\u003c/p\u003e\n\u003cp data-block-index=\"62\" data-block-type=\"paragraph\"\u003e每条批复通常包含：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003e文件路径。\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003e标题。\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003e段落位置。\u003c/li\u003e\u003cli data-block-index=\"66\" data-block-type=\"list-item\"\u003e动作。\u003c/li\u003e\u003cli data-block-index=\"67\" data-block-type=\"list-item\"\u003e目标。\u003c/li\u003e\u003cli data-block-index=\"68\" data-block-type=\"list-item\"\u003e时间。\u003c/li\u003e\u003cli data-block-index=\"69\" data-block-type=\"list-item\"\u003e引用原文。\u003c/li\u003e\u003cli data-block-index=\"70\" data-block-type=\"list-item\"\u003e用户批复。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"71\" data-block-type=\"paragraph\"\u003e这个文件可以交给 AI，也可以作为人工修改清单。\u003c/p\u003e\n\u003cp data-block-index=\"72\" data-block-type=\"paragraph\"\u003e推荐用法是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e复制或下载 review.md\n  -\u0026gt; 粘贴给 AI，或作为文件交给 AI\n  -\u0026gt; 要求 AI 根据批复提出修改建议或生成新版本\n  -\u0026gt; 用户确认后，再决定是否修改源文件\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"73\" data-block-type=\"paragraph\"\u003e阅读器不会替用户自动执行这些修改。\u003c/p\u003e\n\u003cp data-block-index=\"74\" data-block-type=\"paragraph\"\u003e完整闭环可以是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e任意来源文件\n  -\u0026gt; 打包 reader.html\n  -\u0026gt; 人工阅读和审批\n  -\u0026gt; 导出 review.md\n  -\u0026gt; AI 根据批复修改源文件或生成新版本\n  -\u0026gt; 再次打包 reader.html\n  -\u0026gt; 人工验收\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e重新打包 review.md\u003c/h2\u003e\n\u003cp data-block-index=\"75\" data-block-type=\"paragraph\"\u003e下载后的 \u003ccode\u003ereview.md\u003c/code\u003e 可以放入一个文件夹，然后再次用阅读器打包。\u003c/p\u003e\n\u003cp data-block-index=\"76\" data-block-type=\"paragraph\"\u003e这适合：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"77\" data-block-type=\"list-item\"\u003e复读批复。\u003c/li\u003e\u003cli data-block-index=\"78\" data-block-type=\"list-item\"\u003e归档批复。\u003c/li\u003e\u003cli data-block-index=\"79\" data-block-type=\"list-item\"\u003e二次审阅批复。\u003c/li\u003e\u003cli data-block-index=\"80\" data-block-type=\"list-item\"\u003e把多个批复文件合并成一个可搜索阅读器。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"81\" data-block-type=\"paragraph\"\u003e这条链路不承诺结构可逆，只承诺作为普通 Markdown 可读、可搜索、可继续审阅。\u003c/p\u003e\n\u003ch2\u003e链接和图片\u003c/h2\u003e\n\u003cp data-block-index=\"82\" data-block-type=\"paragraph\"\u003eMarkdown 链接默认不会被启用。\u003c/p\u003e\n\u003cp data-block-index=\"83\" data-block-type=\"paragraph\"\u003e阅读器会显示：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e（未知链接，请回源文件查看）\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"84\" data-block-type=\"paragraph\"\u003e这样做是为了避免外部或 AI 生成的 Markdown 在浏览器中激活不可信链接。\u003c/p\u003e\n\u003cp data-block-index=\"85\" data-block-type=\"paragraph\"\u003e图片支持基础显示。转换器生成的 data URL 图片可以进入阅读器，但复杂文档中的图片提取质量取决于转换器。\u003c/p\u003e\n\u003ch2\u003e常见问题\u003c/h2\u003e\n\u003ch3\u003e新增源文件后页面为什么没变化？\u003c/h3\u003e\n\u003cp data-block-index=\"86\" data-block-type=\"paragraph\"\u003e需要重新运行构建命令。\u003c/p\u003e\n\u003cp data-block-index=\"87\" data-block-type=\"paragraph\"\u003e阅读器 HTML 是一次性打包产物，不会自动监听文件夹。\u003c/p\u003e\n\u003ch3\u003e为什么浏览器不能直接读取当前文件夹？\u003c/h3\u003e\n\u003cp data-block-index=\"88\" data-block-type=\"paragraph\"\u003e浏览器出于安全限制，不能静默扫描本地目录。\u003c/p\u003e\n\u003cp data-block-index=\"89\" data-block-type=\"paragraph\"\u003e当前设计是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ePython 读取本地文件\n  -\u0026gt; HTML 负责阅读和交互\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch3\u003e为什么不直接修改源文件？\u003c/h3\u003e\n\u003cp data-block-index=\"90\" data-block-type=\"paragraph\"\u003e为了安全和可控。\u003c/p\u003e\n\u003cp data-block-index=\"91\" data-block-type=\"paragraph\"\u003e阅读器只生成旁路批复文件。是否修改源文件，由用户或后续 AI 流程决定。\u003c/p\u003e", "content_text": "# 用户手册\n\n本文件面向普通使用者，说明阅读器界面、快捷键、审阅板和导出流程。\n\n对应英文文件：`04-user-manual.en.md`\n\n## 生成阅读器\n\n在项目目录中运行：\n\n```powershell\npython build_reader.py workspace.config.md\n```\n\n生成文件：\n\n```text\noutput/reader.html\n```\n\n也可以启动本地预览服务：\n\n```powershell\npython serve_reader.py\n```\n\n默认地址：\n\n```text\nhttp://127.0.0.1:8766/output/reader.html\n```\n\n## 界面结构\n\n阅读器主要分为三栏：\n\n- 左侧：目录栏。\n- 中间：正文阅读区。\n- 右侧：审阅板。\n\n目录栏和审阅板都可以折叠。左右栏宽度可以拖拽调整，并会保存到浏览器本地状态。\n\n## 顶部工具栏\n\n顶部工具栏包含：\n\n- 搜索框。\n- 文件类型筛选。\n- 正序/倒序切换。\n- 字体大小调整。\n- 阅读宽度调整。\n- 深色/浅色模式切换。\n- 恢复默认布局按钮。\n- 目录栏折叠按钮。\n- 审阅板折叠按钮。\n\n搜索会匹配：\n\n- 标题。\n- 文件名。\n- 相对路径。\n- 正文内容。\n\n搜索后的结果会形成临时书单。上一篇和下一篇只在当前筛选结果中移动。\n\n## 快捷键\n\n当前快捷键：\n\n| 快捷键 | 功能 |\n| --- | --- |\n| `A` | 上一篇 |\n| `←` | 上一篇 |\n| `D` | 下一篇 |\n| `→` | 下一篇 |\n| `R` | 打开审阅窗口 |\n\n当光标位于输入框、下拉框或文本框中时，快捷键不会触发翻页或打开审阅窗口。\n\n在 Microsoft Edge 等浏览器中，选中文本后浏览器可能显示自己的迷你菜单。这个菜单有时会挡住页面或截获按键，导致 `R` 没有打开审阅窗口。Firefox 中通常不会出现这个问题。遇到这种情况时，直接点击页面中的浮动批复按钮，或点击段落旁的批复按钮。\n\n## 阅读设置\n\n可以调整：\n\n- 字体大小。\n- 阅读宽度。\n- 深色/浅色模式。\n- 左侧目录栏宽度。\n- 右侧审阅板宽度。\n- 目录栏和审阅板是否折叠。\n\n这些设置会保存在浏览器 `localStorage` 中。刷新页面后仍会恢复。\n\n恢复默认按钮会重置阅读布局相关设置，但不会删除批复。\n\n## 添加批复\n\n可以用两种方式添加批复：\n\n- 选中文本后点击浮动批复按钮，或按 `R`。\n- 点击段落旁边的批复按钮。\n\n如果选中了文本，审阅窗口会优先引用选中文本。\n\n如果没有选中文本，审阅窗口会引用当前段落。\n\n审阅窗口包含：\n\n- 引用原文。\n- 动作。\n- 目标。\n- 用户批复说明。\n\n动作和目标来自配置文件，可以按自己的工作流修改。\n\n## 审阅板\n\n审阅板会显示当前所有批复。\n\n支持：\n\n- 编辑动作。\n- 编辑目标。\n- 编辑用户批复说明。\n- 删除单条批复。\n- 清空所有批复。\n- 复制 `review.md`。\n- 下载 `review.md`。\n\n编辑审阅板中的批复时，引用原文不会被修改。\n\n## 导出的 review.md\n\n导出的 `review.md` 按文件分组。\n\n每条批复通常包含：\n\n- 文件路径。\n- 标题。\n- 段落位置。\n- 动作。\n- 目标。\n- 时间。\n- 引用原文。\n- 用户批复。\n\n这个文件可以交给 AI，也可以作为人工修改清单。\n\n推荐用法是：\n\n```text\n复制或下载 review.md\n  -\u003e 粘贴给 AI，或作为文件交给 AI\n  -\u003e 要求 AI 根据批复提出修改建议或生成新版本\n  -\u003e 用户确认后，再决定是否修改源文件\n```\n\n阅读器不会替用户自动执行这些修改。\n\n完整闭环可以是：\n\n```text\n任意来源文件\n  -\u003e 打包 reader.html\n  -\u003e 人工阅读和审批\n  -\u003e 导出 review.md\n  -\u003e AI 根据批复修改源文件或生成新版本\n  -\u003e 再次打包 reader.html\n  -\u003e 人工验收\n```\n\n## 重新打包 review.md\n\n下载后的 `review.md` 可以放入一个文件夹，然后再次用阅读器打包。\n\n这适合：\n\n- 复读批复。\n- 归档批复。\n- 二次审阅批复。\n- 把多个批复文件合并成一个可搜索阅读器。\n\n这条链路不承诺结构可逆，只承诺作为普通 Markdown 可读、可搜索、可继续审阅。\n\n## 链接和图片\n\nMarkdown 链接默认不会被启用。\n\n阅读器会显示：\n\n```text\n（未知链接，请回源文件查看）\n```\n\n这样做是为了避免外部或 AI 生成的 Markdown 在浏览器中激活不可信链接。\n\n图片支持基础显示。转换器生成的 data URL 图片可以进入阅读器，但复杂文档中的图片提取质量取决于转换器。\n\n## 常见问题\n\n### 新增源文件后页面为什么没变化？\n\n需要重新运行构建命令。\n\n阅读器 HTML 是一次性打包产物，不会自动监听文件夹。\n\n### 为什么浏览器不能直接读取当前文件夹？\n\n浏览器出于安全限制，不能静默扫描本地目录。\n\n当前设计是：\n\n```text\nPython 读取本地文件\n  -\u003e HTML 负责阅读和交互\n```\n\n### 为什么不直接修改源文件？\n\n为了安全和可控。\n\n阅读器只生成旁路批复文件。是否修改源文件，由用户或后续 AI 流程决定。\n"}, {"id": "chapter-009", "title": "Security Notes", "file_name": "05-security-notes.en.md", "relative_path": "docs/05-security-notes.en.md", "path": "docs/05-security-notes.en.md", "folder": "docs", "path_segments": ["docs"], "prefix": "05", "ext": ".md", "word_count": 709, "modified_time": "2026-07-02T00:51:26", "content_html": "\u003ch1\u003eSecurity Notes\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eThis file explains the project\u0026#x27;s security model, current protections, and remaining user responsibilities.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eChinese counterpart: \u003ccode\u003e05-security-notes.zh-CN.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003eBasic View\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003eThis tool is a local-first reader that keeps source files read-only.\u003c/p\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003eIt includes multiple protections, but users should not package and open Markdown/TXT files from unknown sources.\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003eThe reason is simple: the build process places input file content into a browser page. Even with escaping, disabled links, and image restrictions, unknown input can still cause display issues, performance pressure, misleading content, or untested edge cases.\u003c/p\u003e\n\u003ch2\u003eCurrent Protections\u003c/h2\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eThe current version includes these protections:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"7\" data-block-type=\"list-item\"\u003eSource files are read-only; the build process does not modify source chapters.\u003c/li\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003e\u003ccode\u003esource_dir\u003c/code\u003e and \u003ccode\u003eoutput\u003c/code\u003e must stay inside the project folder containing the config file.\u003c/li\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003eMarkdown links do not generate clickable \u003ccode\u003e\u0026lt;a href=...\u0026gt;\u003c/code\u003e elements by default.\u003c/li\u003e\u003cli data-block-index=\"10\" data-block-type=\"list-item\"\u003eLinks are replaced with a notice such as \u0026quot;Unknown link, check the source file\u0026quot;.\u003c/li\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003eImage URLs reject protocols such as \u003ccode\u003ejavascript:\u003c/code\u003e.\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003e\u003ccode\u003edata:image/...\u003c/code\u003e is limited to common raster image types: png, jpg, jpeg, gif, webp.\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003eJSON embedded inside \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e escapes \u003ccode\u003e\u0026lt;\u003c/code\u003e, \u003ccode\u003e\u0026gt;\u003c/code\u003e, and \u003ccode\u003e\u0026amp;\u003c/code\u003e, preventing \u003ccode\u003e\u0026lt;/script\u0026gt;\u003c/code\u003e injection.\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eInvalid \u003ccode\u003edocx-table\u003c/code\u003e blocks fall back to code blocks instead of breaking the build.\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e\u003ccode\u003edry-run\u003c/code\u003e lets users inspect the read scope before writing output.\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e\u003ccode\u003eoverwrite: false\u003c/code\u003e avoids replacing existing outputs.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eProtection Boundaries for MD, TXT, and DOCX\u003c/h2\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003eThese protections are not limited to Markdown.\u003c/p\u003e\n\u003cp data-block-index=\"18\" data-block-type=\"paragraph\"\u003eContent that enters the reader is protected by the final HTML packaging layer:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.md\u003c/code\u003e: rendered by the basic Markdown renderer. Links are disabled, images are restricted, and embedded JSON is safely escaped.\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.txt\u003c/code\u003e: Markdown is not interpreted. Text is HTML-escaped directly. Even \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e, \u003ccode\u003e@@INLINEPROTECTED0@@\u003c/code\u003e, or image syntax is shown as plain text.\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.docx\u003c/code\u003e: not read directly by the browser. It must first be converted into \u003ccode\u003e.md\u003c/code\u003e, then it enters the same Markdown reader protections.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003eOne important boundary remains: the DOCX converter is a conversion stage, not the browser reading stage.\u003c/p\u003e\n\u003cp data-block-index=\"23\" data-block-type=\"paragraph\"\u003eThe more accurate statement is:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eTXT is more conservative inside the reader;\nMD is rendered with restrictions inside the reader;\nDOCX receives the same reader protections after conversion to MD, but unknown Office files are still not recommended at the converter stage.\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eUnknown Input Is Still Not Recommended\u003c/h2\u003e\n\u003cp data-block-index=\"24\" data-block-type=\"paragraph\"\u003ePrefer packaging Markdown/TXT that you created, downloaded from a verified source, or received from a trusted collaborator.\u003c/p\u003e\n\u003cp data-block-index=\"25\" data-block-type=\"paragraph\"\u003eAvoid directly packaging:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003eMarkdown from unknown sources.\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003eTXT from unknown sources.\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003eUnreviewed bulk AI-generated files.\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003eDOCX or other Office documents from unknown sources.\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003eLarge copied content from web pages, email, or chat tools.\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003eFiles with extremely long lines, huge base64 payloads, or abnormal nested tables.\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003eData that you do not want exposed inside a browser page.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"33\" data-block-type=\"paragraph\"\u003eEven if these inputs do not execute scripts, they may still cause:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003eOversized pages.\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003eBrowser slowdown.\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003eMisleading content.\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003eDifficult search and review positioning.\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003eUnknown rendering edge cases.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eGenerated HTML Contains Content\u003c/h2\u003e\n\u003cp data-block-index=\"39\" data-block-type=\"paragraph\"\u003eGenerated \u003ccode\u003ereader.html\u003c/code\u003e is a packaged content file, not an empty index.\u003c/p\u003e\n\u003cp data-block-index=\"40\" data-block-type=\"paragraph\"\u003eIf source files contain sensitive information, the generated HTML also contains that information.\u003c/p\u003e\n\u003cp data-block-index=\"41\" data-block-type=\"paragraph\"\u003eDo not upload sensitive generated HTML to public platforms, and do not send it to people who should not see the source content.\u003c/p\u003e\n\u003ch2\u003elocalStorage Notes\u003c/h2\u003e\n\u003cp data-block-index=\"42\" data-block-type=\"paragraph\"\u003eReading preferences and review notes are saved in browser \u003ccode\u003elocalStorage\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003eThis means:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003eReview notes can survive page refresh.\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003eThe same browser and page origin may retain previous review notes.\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003eIf the local HTTP server is used, state is stored under that local address.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"47\" data-block-type=\"paragraph\"\u003eFor sensitive content, clear review notes before publishing or demonstrating the page, or use a clean browser profile.\u003c/p\u003e\n\u003ch2\u003eLocal Server Notes\u003c/h2\u003e\n\u003cp data-block-index=\"48\" data-block-type=\"paragraph\"\u003e\u003ccode\u003eserve_reader.py\u003c/code\u003e binds to:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e127.0.0.1\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"49\" data-block-type=\"paragraph\"\u003eThis is a local machine address.\u003c/p\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003eDo not bind the server to a public or LAN-accessible address. The local server serves the project folder as its static file root.\u003c/p\u003e\n\u003ch2\u003eConverter Notes\u003c/h2\u003e\n\u003cp data-block-index=\"51\" data-block-type=\"paragraph\"\u003eThe optional DOCX converter reads \u003ccode\u003e.docx\u003c/code\u003e files and generates Markdown.\u003c/p\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003eThe converter does not modify source files, but unknown Office documents are still not recommended. They may be large, malformed, or contain complex structures outside the current converter scope.\u003c/p\u003e\n\u003ch2\u003eRecommended Workflow\u003c/h2\u003e\n\u003cp data-block-index=\"53\" data-block-type=\"paragraph\"\u003eA safer workflow is:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eConfirm the source is trusted\n  -\u0026gt; inspect read scope with dry-run\n  -\u0026gt; build reader.html\n  -\u0026gt; open locally\n  -\u0026gt; export review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"54\" data-block-type=\"paragraph\"\u003eIf you only want to inspect unfamiliar Markdown content, open it in a plain text editor first, then decide whether to package it into the reader.\u003c/p\u003e", "content_text": "# Security Notes\n\nThis file explains the project's security model, current protections, and remaining user responsibilities.\n\nChinese counterpart: `05-security-notes.zh-CN.md`\n\n## Basic View\n\nThis tool is a local-first reader that keeps source files read-only.\n\nIt includes multiple protections, but users should not package and open Markdown/TXT files from unknown sources.\n\nThe reason is simple: the build process places input file content into a browser page. Even with escaping, disabled links, and image restrictions, unknown input can still cause display issues, performance pressure, misleading content, or untested edge cases.\n\n## Current Protections\n\nThe current version includes these protections:\n\n- Source files are read-only; the build process does not modify source chapters.\n- `source_dir` and `output` must stay inside the project folder containing the config file.\n- Markdown links do not generate clickable `` elements by default.\n- Links are replaced with a notice such as \"Unknown link, check the source file\".\n- Image URLs reject protocols such as `javascript:`.\n- `data:image/...` is limited to common raster image types: png, jpg, jpeg, gif, webp.\n- JSON embedded inside `` escapes ``, and `\u0026`, preventing `` injection.\n- Invalid `docx-table` blocks fall back to code blocks instead of breaking the build.\n- `dry-run` lets users inspect the read scope before writing output.\n- `overwrite: false` avoids replacing existing outputs.\n\n## Protection Boundaries for MD, TXT, and DOCX\n\nThese protections are not limited to Markdown.\n\nContent that enters the reader is protected by the final HTML packaging layer:\n\n- `.md`: rendered by the basic Markdown renderer. Links are disabled, images are restricted, and embedded JSON is safely escaped.\n- `.txt`: Markdown is not interpreted. Text is HTML-escaped directly. Even ``, `[link](javascript:...)`, or image syntax is shown as plain text.\n- `.docx`: not read directly by the browser. It must first be converted into `.md`, then it enters the same Markdown reader protections.\n\nOne important boundary remains: the DOCX converter is a conversion stage, not the browser reading stage.\n\nThe more accurate statement is:\n\n```text\nTXT is more conservative inside the reader;\nMD is rendered with restrictions inside the reader;\nDOCX receives the same reader protections after conversion to MD, but unknown Office files are still not recommended at the converter stage.\n```\n\n## Unknown Input Is Still Not Recommended\n\nPrefer packaging Markdown/TXT that you created, downloaded from a verified source, or received from a trusted collaborator.\n\nAvoid directly packaging:\n\n- Markdown from unknown sources.\n- TXT from unknown sources.\n- Unreviewed bulk AI-generated files.\n- DOCX or other Office documents from unknown sources.\n- Large copied content from web pages, email, or chat tools.\n- Files with extremely long lines, huge base64 payloads, or abnormal nested tables.\n- Data that you do not want exposed inside a browser page.\n\nEven if these inputs do not execute scripts, they may still cause:\n\n- Oversized pages.\n- Browser slowdown.\n- Misleading content.\n- Difficult search and review positioning.\n- Unknown rendering edge cases.\n\n## Generated HTML Contains Content\n\nGenerated `reader.html` is a packaged content file, not an empty index.\n\nIf source files contain sensitive information, the generated HTML also contains that information.\n\nDo not upload sensitive generated HTML to public platforms, and do not send it to people who should not see the source content.\n\n## localStorage Notes\n\nReading preferences and review notes are saved in browser `localStorage`.\n\nThis means:\n\n- Review notes can survive page refresh.\n- The same browser and page origin may retain previous review notes.\n- If the local HTTP server is used, state is stored under that local address.\n\nFor sensitive content, clear review notes before publishing or demonstrating the page, or use a clean browser profile.\n\n## Local Server Notes\n\n`serve_reader.py` binds to:\n\n```text\n127.0.0.1\n```\n\nThis is a local machine address.\n\nDo not bind the server to a public or LAN-accessible address. The local server serves the project folder as its static file root.\n\n## Converter Notes\n\nThe optional DOCX converter reads `.docx` files and generates Markdown.\n\nThe converter does not modify source files, but unknown Office documents are still not recommended. They may be large, malformed, or contain complex structures outside the current converter scope.\n\n## Recommended Workflow\n\nA safer workflow is:\n\n```text\nConfirm the source is trusted\n  -\u003e inspect read scope with dry-run\n  -\u003e build reader.html\n  -\u003e open locally\n  -\u003e export review.md\n```\n\nIf you only want to inspect unfamiliar Markdown content, open it in a plain text editor first, then decide whether to package it into the reader.\n"}, {"id": "chapter-010", "title": "安全说明", "file_name": "05-security-notes.zh-CN.md", "relative_path": "docs/05-security-notes.zh-CN.md", "path": "docs/05-security-notes.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "05", "ext": ".md", "word_count": 1172, "modified_time": "2026-07-02T00:51:25", "content_html": "\u003ch1\u003e安全说明\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文件说明本项目的安全模型、已有防护和仍然需要用户注意的风险。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e05-security-notes.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e基本判断\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003e这个工具是本地优先、只读源文件的阅读器。\u003c/p\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e它做了多层防护，但不建议用户打包和打开来路不明的 Markdown/TXT 文件。\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003e原因很简单：打包过程会把输入文件内容放进一个浏览器页面里。即使脚本已经尽量转义、禁用链接和限制图片，未知输入仍然可能带来显示异常、性能压力、误导性内容或未发现的边界问题。\u003c/p\u003e\n\u003ch2\u003e已有防护\u003c/h2\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003e当前版本已经做了这些防护：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"7\" data-block-type=\"list-item\"\u003e源文件只读，构建过程不修改源章节。\u003c/li\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003e\u003ccode\u003esource_dir\u003c/code\u003e 和 \u003ccode\u003eoutput\u003c/code\u003e 必须留在配置文件所在项目目录内。\u003c/li\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003eMarkdown 链接默认不生成可点击 \u003ccode\u003e\u0026lt;a href=...\u0026gt;\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"10\" data-block-type=\"list-item\"\u003e链接会显示为“未知链接，请回源文件查看”这类占位提示。\u003c/li\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003e图片 URL 禁止 \u003ccode\u003ejavascript:\u003c/code\u003e 等协议。\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003e\u003ccode\u003edata:image/...\u003c/code\u003e 仅允许常见 raster 图片类型：png、jpg、jpeg、gif、webp。\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003e嵌入到 \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e 中的 JSON 会转义 \u003ccode\u003e\u0026lt;\u003c/code\u003e、\u003ccode\u003e\u0026gt;\u003c/code\u003e、\u003ccode\u003e\u0026amp;\u003c/code\u003e，避免 \u003ccode\u003e\u0026lt;/script\u0026gt;\u003c/code\u003e 注入。\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003e异常 \u003ccode\u003edocx-table\u003c/code\u003e 会回退为代码块，而不是中断构建。\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e\u003ccode\u003edry-run\u003c/code\u003e 可以在写出文件前查看读取范围。\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e\u003ccode\u003eoverwrite: false\u003c/code\u003e 时不会覆盖已有输出。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eMD、TXT 和 DOCX 的防护边界\u003c/h2\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003e这些防护并不是只针对 Markdown。\u003c/p\u003e\n\u003cp data-block-index=\"18\" data-block-type=\"paragraph\"\u003e进入阅读器后的内容都会受到最终 HTML 打包层的保护：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.md\u003c/code\u003e：走 Markdown 基础渲染。链接会被禁用，图片会被限制，嵌入 JSON 会被安全转义。\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.txt\u003c/code\u003e：不解释 Markdown，直接做 HTML 转义。即使文本里写了 \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e、\u003ccode\u003e@@INLINEPROTECTED0@@\u003c/code\u003e 或图片语法，也只会作为普通文本显示。\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.docx\u003c/code\u003e：不会被浏览器直接读取。它需要先通过可选转换器变成 \u003ccode\u003e.md\u003c/code\u003e，然后再进入 Markdown 阅读器的同一套防护。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003e需要注意的是：DOCX 转换器本身属于转换阶段，不等同于浏览器阅读阶段。\u003c/p\u003e\n\u003cp data-block-index=\"23\" data-block-type=\"paragraph\"\u003e所以更准确的说法是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eTXT 在阅读器内更保守；\nMD 在阅读器内被限制渲染；\nDOCX 转成 MD 后享受同一套阅读器防护，但转换器阶段仍不建议处理不可信 Office 文件。\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e仍然不建议处理不可信输入\u003c/h2\u003e\n\u003cp data-block-index=\"24\" data-block-type=\"paragraph\"\u003e请尽量只打包你自己生成、自己下载后已确认来源、或来自可信协作者的 Markdown/TXT。\u003c/p\u003e\n\u003cp data-block-index=\"25\" data-block-type=\"paragraph\"\u003e不建议直接打包：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e来路不明的 Markdown。\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003e来路不明的 TXT。\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003e未审查的 AI 批量生成文件。\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003e来路不明的 DOCX 或其他 Office 文档。\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003e从网页、邮件、聊天工具里直接复制来的大块内容。\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003e包含大量超长行、超大 base64、异常嵌套表格的文件。\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003e你不准备暴露给浏览器页面的数据。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"33\" data-block-type=\"paragraph\"\u003e这些输入即使不一定造成脚本执行，也可能带来：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e页面体积过大。\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e浏览器卡顿。\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e内容误导。\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e搜索和批复定位困难。\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e未知渲染边界。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e生成 HTML 的敏感性\u003c/h2\u003e\n\u003cp data-block-index=\"39\" data-block-type=\"paragraph\"\u003e生成的 \u003ccode\u003ereader.html\u003c/code\u003e 是内容打包文件，不是空壳索引。\u003c/p\u003e\n\u003cp data-block-index=\"40\" data-block-t
