<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Markdown/TXT Review Reader Docs</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ec;
      --panel: #fffefa;
      --panel-2: #f0ede7;
      --text: #25211b;
      --muted: #70685d;
      --line: #ded6ca;
      --accent: #2f6f73;
      --accent-2: #775a2d;
      --accent-soft: #dfeeed;
      --danger: #a33a32;
      --shadow: 0 16px 36px rgba(48, 39, 28, 0.12);
      --reader-font-size: 18px;
      --reader-width: 100%;
      --left-panel-width: 300px;
      --right-panel-width: 360px;
      --toolbar-height: 104px;
    }
    body.dark {
      color-scheme: dark;
      --bg: #171b1c;
      --panel: #222829;
      --panel-2: #2b3233;
      --text: #eee9df;
      --muted: #b8afa2;
      --line: #3d4546;
      --accent: #8ac7be;
      --accent-2: #d4b06c;
      --accent-soft: #243c3d;
      --danger: #f08d86;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      line-height: 1.7;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
    .toolbar {
      position: sticky; top: 0; z-index: 5;
      display: grid; grid-template-columns: 1fr; gap: 8px;
      padding: 10px 14px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .toolbar-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-width: 0; }
    .book-title { min-width: 0; font-size: 18px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .controls { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; align-items: center; }
    .toolbar-main { justify-content: flex-end; flex: 0 0 auto; }
    .toolbar-filters { justify-content: flex-start; }
    .search, .select, .field, textarea {
      border: 1px solid var(--line); background: var(--panel); border-radius: 6px; padding: 8px 10px;
    }
    .search { width: min(320px, 32vw); min-width: 160px; }
    .btn {
      min-height: 38px; border: 1px solid var(--line); background: var(--panel); border-radius: 6px;
      padding: 7px 10px; cursor: pointer;
    }
    .btn:hover, .chapter-item:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.danger { border-color: color-mix(in srgb, var(--danger) 45%, var(--line)); color: var(--danger); }
    .layout { display: grid; grid-template-columns: var(--left-panel-width) 0 minmax(0, 1fr) 0 var(--right-panel-width); min-height: 0; }
    .layout.left-collapsed { grid-template-columns: 0 0 minmax(0, 1fr) 0 var(--right-panel-width); }
    .layout.right-collapsed { grid-template-columns: var(--left-panel-width) 0 minmax(0, 1fr) 0 0; }
    .layout.left-collapsed.right-collapsed { grid-template-columns: 0 0 minmax(0, 1fr) 0 0; }
    .layout.left-collapsed .sidebar,
    .layout.left-collapsed .panel-resizer.left,
    .layout.right-collapsed .review-panel,
    .layout.right-collapsed .panel-resizer.right { display: none; }
    .sidebar { grid-column: 1; }
    .panel-resizer.left { grid-column: 2; }
    .reader-shell { grid-column: 3; }
    .panel-resizer.right { grid-column: 4; }
    .review-panel { grid-column: 5; }
    .sidebar, .review-panel {
      position: sticky; top: var(--toolbar-height); height: calc(100vh - var(--toolbar-height)); overflow: auto; background: var(--panel); padding: 12px;
    }
    .sidebar { border-right: 1px solid var(--line); }
    .review-panel { border-left: 1px solid var(--line); }
    .panel-resizer {
      position: sticky; top: var(--toolbar-height); height: calc(100vh - var(--toolbar-height)); width: 9px; z-index: 3;
      align-self: start; cursor: col-resize; background: transparent;
    }
    .panel-resizer::before {
      content: ""; display: block; width: 1px; height: 100%; margin: 0 auto; background: var(--line);
    }
    .panel-resizer:hover::before,
    .panel-resizer.dragging::before { width: 3px; background: var(--accent); }
    .panel-resizer.left { margin-left: -5px; margin-right: -4px; }
    .panel-resizer.right { margin-left: -4px; margin-right: -5px; }
    body.resizing-panels { cursor: col-resize; user-select: none; }
    .side-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .small-text { color: var(--muted); font-size: 12px; }
    .chapter-list { display: grid; gap: 8px; }
    .chapter-item {
      width: 100%; text-align: left; border: 1px solid var(--line); background: var(--panel);
      border-radius: 8px; padding: 10px; cursor: pointer;
    }
    .chapter-item.active { border-color: var(--accent); background: var(--accent-soft); }
    .chapter-name { display: block; font-weight: 800; line-height: 1.35; }
    .chapter-meta { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.4; word-break: break-all; }
    .reader-shell { min-width: 0; padding: 18px 18px 96px; overflow-anchor: none; }
    .reader {
      width: min(var(--reader-width), 100%); margin: 0 auto; background: var(--panel);
      border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 46px);
    }
    .reader > h1 { margin: 0 0 6px; font-size: calc(var(--reader-font-size) * 1.65); line-height: 1.25; letter-spacing: 0; }
    .source-line { margin-bottom: 18px; color: var(--muted); font-size: 14px; word-break: break-all; }
    .chapter-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 18px 0; }
    .content { font-size: var(--reader-font-size); }
    .content h1, .content h2, .content h3 { line-height: 1.35; margin-top: 1.25em; }
    .content h1 { font-size: 2em; }
    .content h2 { font-size: 1.5em; }
    .content h3 { font-size: 1.25em; }
    .content p, .content blockquote, .content li { position: relative; }
    .content p { margin: 0 0 1em; }
    .content blockquote {
      margin: 1em 0; padding: .2em 1em; border-left: 4px solid var(--accent);
      color: var(--muted); background: var(--accent-soft);
    }
    .content img { max-width: 100%; height: auto; border-radius: 6px; cursor: zoom-in; }
    .content a { color: var(--accent); }
    .content .disabled-link, .content .disabled-image {
      display: inline-block;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 .55em;
      background: var(--panel);
      font-size: .9em;
    }
    .content mark { background: #ffe58a; color: #241f18; padding: 0 .08em; }
    .content .docx-small { font-size: .78em; color: var(--muted); }
    .code-block { margin: 1em 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--panel-2); }
    .code-tools { display: flex; justify-content: space-between; gap: 10px; padding: 7px 10px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .code-block pre { margin: 0; overflow: auto; padding: 14px; }
    code, pre { font-family: Consolas, "Cascadia Mono", monospace; }
    .table-wrap { overflow: auto; margin: 1em 0; border: 1px solid var(--line); border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; min-width: 520px; background: var(--panel); }
    .docx-structured-table { min-width: 520px; }
    .docx-nested-table { min-width: 260px; margin: 6px 0; border: 1px solid var(--line); }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 10px; vertical-align: top; }
    th { position: sticky; top: 0; background: var(--panel-2); text-align: left; font-weight: 800; }
    tr:hover td { background: var(--accent-soft); }
    .block-review {
      opacity: 0; position: absolute; right: 0; transform: translateX(100%); margin-right: -8px;
      border: 1px solid var(--line); background: var(--panel); border-radius: 999px; padding: 2px 7px; font-size: 12px; cursor: pointer;
    }
    [data-block-index]:hover .block-review { opacity: 1; }
    .fixed-nav {
      position: fixed; left: var(--fixed-left-offset); right: var(--fixed-right-offset); bottom: 0; z-index: 4;
      display: flex; justify-content: center; align-items: center; gap: 12px;
      padding: 10px; background: color-mix(in srgb, var(--panel) 94%, transparent);
      border-top: 1px solid var(--line); backdrop-filter: blur(10px);
    }
    .floating-review {
      position: fixed; right: calc(var(--fixed-right-offset) + 20px); bottom: 80px; z-index: 10;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: white; border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
      display: flex; align-items: center; justify-content: center; cursor: grab;
      opacity: .72; transition: opacity .18s, transform .18s, box-shadow .18s;
      user-select: none; -webkit-user-select: none;
    }
    .floating-review:hover,
    .floating-review.has-selection {
      opacity: 1; transform: scale(1.08); box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .floating-review.dragging { cursor: grabbing; opacity: 1; transform: scale(1.12); }
    @media (max-width: 1100px) {
      .floating-review { right: 16px; bottom: 80px; }
    }
    .review-list { display: grid; gap: 10px; margin: 10px 0; }
    .review-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: var(--panel); overflow-wrap: anywhere; word-break: break-word; }
    .review-item header { display: flex; justify-content: space-between; gap: 8px; align-items: start; margin-bottom: 8px; }
    .review-item textarea { width: 100%; min-height: 72px; resize: vertical; margin-top: 8px; }
    .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .review-preview { width: 100%; min-height: 220px; margin-top: 10px; resize: vertical; font-family: Consolas, monospace; font-size: 12px; }
    .empty { padding: 14px; color: var(--muted); text-align: center; border: 1px dashed var(--line); border-radius: 8px; }
    dialog { width: min(680px, calc(100vw - 32px)); border: 1px solid var(--line); border-radius: 10px; background: var(--panel); color: var(--text); box-shadow: var(--shadow); resize: both; overflow: auto; min-width: 320px; min-height: 240px; max-width: 92vw; max-height: 92vh; }
    dialog::backdrop { background: rgba(0, 0, 0, .35); }
    .dialog-body { display: grid; gap: 10px; }
    .quote-box { max-height: 180px; overflow: auto; padding: 10px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: var(--left-panel-width) 0 minmax(0, 1fr); }
      .layout.left-collapsed,
      .layout.left-collapsed.right-collapsed { grid-template-columns: 0 0 minmax(0, 1fr); }
      .layout.right-collapsed { grid-template-columns: var(--left-panel-width) 0 minmax(0, 1fr); }
      .review-panel { position: static; height: auto; grid-column: 3; border-left: 0; border-top: 1px solid var(--line); }
      .layout.left-collapsed:not(.right-collapsed) { grid-template-columns: 0 0 minmax(0, 1fr) 0 var(--right-panel-width); }
      .layout.left-collapsed:not(.right-collapsed) .review-panel {
        position: sticky; top: var(--toolbar-height); height: calc(100vh - var(--toolbar-height));
        grid-column: 5; border-left: 1px solid var(--line); border-top: 0;
      }
      .layout.left-collapsed:not(.right-collapsed) .panel-resizer.right { display: block; grid-column: 4; }
      .fixed-nav { left: var(--fixed-left-offset); right: 0; }
      .panel-resizer.right { display: none; }
    }
    @media (max-width: 820px) {
      .toolbar-row { align-items: stretch; flex-direction: column; }
      .toolbar-main, .toolbar-filters { justify-content: flex-start; width: 100%; }
      .search { width: 100%; }
      .layout,
      .layout.left-collapsed,
      .layout.right-collapsed,
      .layout.left-collapsed.right-collapsed { grid-template-columns: minmax(0, 1fr); }
      .sidebar { position: static; height: auto; max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); grid-column: 1; }
      .panel-resizer { display: none; }
      .reader-shell { padding: 14px 10px 96px; grid-column: 1; }
      .review-panel { grid-column: 1; }
      .layout.left-collapsed:not(.right-collapsed) .review-panel { position: static; height: auto; grid-column: 1; border-left: 0; border-top: 1px solid var(--line); }
      .layout.left-collapsed:not(.right-collapsed) .panel-resizer.right { display: none; }
      .fixed-nav { left: 0; right: 0; }
      .block-review { opacity: 1; position: static; transform: none; margin: 4px 0 0 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-row">
        <div class="book-title" id="bookTitle"></div>
        <div class="controls toolbar-main">
          <button class="btn" id="toggleTocButton" type="button">收起目录</button>
          <button class="btn" id="toggleReviewPanelButton" type="button">收起审阅板</button>
          <button class="btn" id="themeButton" type="button">深色</button>
        </div>
      </div>
      <div class="controls toolbar-filters">
        <input class="search" id="searchInput" type="search" placeholder="搜索标题、路径或正文">
        <select class="select" id="extFilter" title="文件类型">
          <option value="all">全部</option>
          <option value=".md">.md</option>
          <option value=".txt">.txt</option>
        </select>
        <button class="btn" id="clearFilterButton" type="button">清空</button>
        <button class="btn" id="sortButton" type="button">正序</button>
        <button class="btn" id="smallerButton" type="button">A-</button>
        <button class="btn" id="largerButton" type="button">A+</button>
        <select class="select" id="widthSelect" title="阅读宽度">
          <option value="780">窄</option>
          <option value="1040">标准</option>
          <option value="1360">大屏</option>
          <option value="full">铺满</option>
        </select>
        <button class="btn" id="resetLayoutButton" type="button">恢复默认</button>
      </div>
    </header>
    <main class="layout" id="layoutRoot">
      <aside class="sidebar">
        <div class="side-head">
          <strong>目录</strong>
          <span class="small-text" id="chapterCount"></span>
        </div>
        <div class="chapter-list" id="chapterList"></div>
      </aside>
      <div class="panel-resizer left" id="leftPanelResizer" role="separator" aria-orientation="vertical" title="拖拽调整目录宽度"></div>
      <section class="reader-shell">
        <article class="reader">
          <h1 id="chapterTitle"></h1>
          <div class="source-line" id="sourceLine"></div>
          <nav class="chapter-nav">
            <button class="btn" id="topPrevButton" type="button">上一篇</button>
            <button class="btn" id="topNextButton" type="button">下一篇</button>
          </nav>
          <div class="content" id="content"></div>
          <nav class="chapter-nav">
            <button class="btn" id="bottomPrevButton" type="button">上一篇</button>
            <button class="btn" id="bottomNextButton" type="button">下一篇</button>
          </nav>
        </article>
      </section>
      <div class="panel-resizer right" id="rightPanelResizer" role="separator" aria-orientation="vertical" title="拖拽调整审阅板宽度"></div>
      <aside class="review-panel">
        <div class="side-head">
          <strong>审阅板</strong>
          <span class="small-text" id="reviewCount"></span>
        </div>
        <div class="controls">
          <button class="btn" id="copyReviewButton" type="button">复制 review.md</button>
          <button class="btn" id="downloadReviewButton" type="button">下载</button>
          <button class="btn danger" id="clearReviewsButton" type="button">清空</button>
        </div>
        <div class="review-list" id="reviewList"></div>
        <textarea class="review-preview" id="reviewPreview" readonly></textarea>
      </aside>
      <button class="floating-review" id="floatingReviewButton" type="button" title="加入批复（可拖拽，快捷键 R）">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.5 4.5l3 3L7 16H4v-3l8.5-8.5z"/>
          <path d="M11 6l3 3"/>
        </svg>
      </button>
    </main>
    <nav class="fixed-nav">
      <button class="btn" id="fixedPrevButton" type="button">上一篇</button>
      <span class="small-text" id="positionText"></span>
      <button class="btn" id="fixedNextButton" type="button">下一篇</button>
    </nav>
  </div>

  <dialog id="reviewDialog">
    <form method="dialog" id="reviewForm">
      <h2>加入批复</h2>
      <div class="dialog-body">
        <label>引用原文</label>
        <div class="quote-box" id="dialogQuote"></div>
        <div class="review-grid">
          <label>动作
            <select class="select" id="dialogAction"></select>
          </label>
          <label>目标
            <select class="select" id="dialogTarget"></select>
          </label>
        </div>
        <label>用户批复</label>
        <textarea id="dialogComment" rows="5" placeholder="写下要交给 AI 或后续流程的处理说明。"></textarea>
      </div>
      <div class="dialog-actions">
        <button class="btn" value="cancel" type="button" id="cancelReviewButton">取消</button>
        <button class="btn primary" value="default" type="submit">加入批复</button>
      </div>
    </form>
  </dialog>

  <script>

ata-block-index=\"10\" data-block-type=\"list-item\"\u003eA Markdown editor.\u003c/li\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003eAn online AI client.\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003eA file manager.\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003eA knowledge base system.\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eA documentation site generator.\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003eA universal multi-format converter.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eStable Main Flow\u003c/h2\u003e\n\u003cp data-block-index=\"16\" data-block-type=\"paragraph\"\u003eThe main flow is complete:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eLocal Markdown/TXT folder\n  -\u0026gt; build_reader.py\n  -\u0026gt; output/reader.html\n  -\u0026gt; browser reading, filtering, reviewing\n  -\u0026gt; exported review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003eRepackaging \u003ccode\u003ereview.md\u003c/code\u003e has also been verified:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ereview.md\n  -\u0026gt; re-enters the reader as normal Markdown\n  -\u0026gt; used for rereading, archiving, or second-pass review\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eCompleted Capabilities\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"18\" data-block-type=\" -block-type=\"list-item\"\u003eNo AI result merging.\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003eNo multi-user collaboration or cloud sync.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eCustomization-Friendly Directions\u003c/h2\u003e\n\u003cp data-block-index=\"46\" data-block-type=\"paragraph\"\u003eThis project is designed to be easy to adapt:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003eChange UI labels and language.\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003eChange review actions and targets.\u003c/li\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003eChange reading layout widths.\u003c/li\u003e\u003cli data-block-index=\"50\" data-block-type=\"list-item\"\u003eChange the exported \u003ccode\u003ereview.md\u003c/code\u003e format.\u003c/li\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003eAdd new file converters.\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003eAdd new Markdown rendering rules.\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003eAdd internal config templates for a team or personal workflow.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"54\" data-block-type=\"paragraph\"\u003eWhen customizing, keep three boundaries first:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003eSource files stay read-only.\u003c/li\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003eThe browser does not gain unnecessary local privileges.\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003eGenerated content remains readable by normal AI tools and humans.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eCurrent Conclusion\u003c/h2\u003e\n\u003cp data-block-index=\"58\" data-block-type=\"paragraph\"\u003eThe current version is ready for a basic open-source release.\u003c/p\u003e\n\u003cp data-block-index=\"59\" data-block-type=\"paragraph\"\u003eIt is not a large platform. It is a small and clear tool: turn a local Markdown/TXT folder into a continuous, filterable, reviewable browser reader, then export AI-friendly follow-up tasks.\u003c/p\u003e", "content_text": "# Project Status\n\nThis file describes the current scope, completed capabilities, boundaries, and future directions of Local Markdown/TXT Review Reader.\n\nChinese counterpart: `01-project-status.zh-CN.md`\n\n## Current Positioning\n\nThis project is a local-first Markdown/TXT review reader.\n\nIts core use cases are:\n\n- Package a folder of `.md` / `.txt` files into one readable HTML file.\n- Search, filter, and move through files in the browser.\n- Select text or paragraphs and create review notes for AI-assisted or manual follow-up work.\n- Export a grouped `review.md`.\n\nIt is not:\n\n- A Markdown editor.\n- An online AI client.\n- A file manager.\n- A knowledge base system.\n- A documentation site generator.\n- A universal multi-format converter.\n\n## Stable Main Flow\n\nThe main flow is complete:\n\n```text\nLocal Markdown/TXT folder\n  -\u003e build_reader.py\n  -\u003e output/reader.html\n  -\u003e browser reading, filtering, reviewing\n  -\u003e exported review.md\n```\n\nRepackaging `review.md` has also been verified:\n\n```text\nreview.md\n  -\u003e re-enters the reader as normal Markdown\n  -\u003e used for rereading, archiving, or second-pass review\n```\n\n## Completed Capabilities\n\n- Recursive or non-recursive `.md` / `.txt` scanning.\n- Natural order, descending order, and modified-time order.\n- Relative path, file name, extension, word count, and modified time metadata.\n- Full-text search across title, path, file name, and content.\n- Filtered results work as a temporary reading list; previous/next follows the active filter.\n- Persistent font size, reading width, dark mode, and side panel widths.\n- Collapsible contents panel and review panel.\n- Paragraph-level and selected-text review notes.\n- Review board editing, deletion, clearing, copying, and downloading.\n- File-grouped `review.md` export.\n- Basic rendering for Markdown tables, code blocks, quotes, lists, and images.\n- Markdown links are disabled by default and replaced with a source-file notice.\n- `dry-run`, non-overwriting output behavior, and clear config errors.\n- Optional `.docx -\u003e .md` converter.\n\n## Safety Boundaries\n\nThis project is intentionally conservative:\n\n- No network access.\n- No uploads.\n- No AI API calls.\n- No browser write-back to source files.\n- No deleting, moving, or renaming source files.\n- No active Markdown links.\n- No Office/PDF/EPUB parsing in the browser.\n\nThe generated HTML contains source file content. Do not publicly share generated HTML if the source files contain sensitive content.\n\n## Current Non-Goals\n\n- No guarantee of perfect complex DOCX layout preservation.\n- No current commitment to `.doc` / `.rtf` / `.pdf` / `.epub` support.\n- No automatic redrawing of charts, flowcharts, or ASCII diagrams.\n- No AI result merging.\n- No multi-user collaboration or cloud sync.\n\n## Customization-Friendly Directions\n\nThis project is designed to be easy to adapt:\n\n- Change UI labels and language.\n- Change review actions and targets.\n- Change reading layout widths.\n- Change the exported `review.md` format.\n- Add new file converters.\n- Add new Markdown rendering rules.\n- Add internal config templates for a team or personal workflow.\n\nWhen customizing, keep three boundaries first:\n\n- Source files stay read-only.\n- The browser does not gain unnecessary local privileges.\n- Generated content remains readable by normal AI tools and humans.\n\n## Current Conclusion\n\nThe current version is ready for a basic open-source release.\n\nIt is not a large platform. It is a small and clear tool: turn a local Markdown/TXT folder into a continuous, filterable, reviewable browser reader, then export AI-friendly follow-up tasks.\n"}, {"id": "chapter-002", "title": "项目状态说明", "file_name": "01-project-status.zh-CN.md", "relative_path": "docs/01-project-status.zh-CN.md", "path": "docs/01-project-status.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "01", "ext": ".md", "word_count": 833, "modified_time": "2026-07-02T00:40:27", "content_html": "\u003ch1\u003e项目状态说明\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文件说明 Local Markdown/TXT Review Reader 当前版本的定位、已完成能力、边界和后续方向。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e01-project-status.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e当前定位\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003e这个项目是一个本地优先的 Markdown/TXT 审阅阅读器。\u003c/p\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e它的核心用途是：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"5\" data-block-type=\"list-item\"\u003e把一个文件夹里的 \u003ccode\u003e.md\u003c/code\u003e / \u003ccode\u003e.txt\u003c/code\u003e 文件打包成一本可阅读的单文件 HTML。\u003c/li\u003e\u003cli data-block-index=\"6\" data-block-type=\"list-item\"\u003e在浏览器中搜索、筛选、连续翻篇。\u003c/li\u003e\u003cli data-block-index=\"7\" data-block-type=\"list-item\"\u003e选中文本或段落，生成面向 AI 或人工后续处理的批复记录。\u003c/li\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003e导出按文件分组的 \u003ccode\u003ereview.md\u003c/code\u003e。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003e它不是：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"10\" data-block-type=\"list-item\"\u003eMarkdown 编辑器。\u003c/li\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003e在线 AI 客户端。\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003e文件管理器。\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003e知识库系统。\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003e文档站生成器。\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e多格式万能转换器。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e当前稳定主链路\u003c/h2\u003e\n\u003cp data-block-index=\"16\" data-block-type=\"paragraph\"\u003e当前主链路已经闭合：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e本地 Markdown/TXT 文件夹\n  -\u0026gt; build_reader.py\n  -\u0026gt; output/reader.html\n  -\u0026gt; 浏览器阅读、筛选、批复\n  -\u0026gt; 导出 review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003e重新打包 \u003ccode\u003ereview.md\u003c/code\u003e 也已经验证可行：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ereview.md\n  -\u0026gt; 作为普通 Markdown 文件重新进入阅读器\n  -\u0026gt; 用于复读、归档、二次审阅\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e已完成能力\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e递归或非递归读取 \u003ccode\u003e.md\u003c/code\u003e / \u003ccode\u003e.txt\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e自然排序、倒序、按修改时间排序。\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e保留相对路径、文件名、扩展名、字数、修改时间。\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e全文搜索标题、路径、文件名和正文。\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003e筛选结果即临时书单，上一篇/下一篇基于当前筛选结果。\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003e字体大小、阅读宽度、深色模式、左右栏宽度持久化。\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003e目录栏和审阅栏可折叠。\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003e支持段落级批复和选中文本批复。\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e审阅板支持编辑、删除、清空、复制、下载。\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003e\u003ccode\u003ereview.md\u003c/code\u003e 按文件分组导出。\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003eMarkdown 表格、代码块、引用、列表、图片基础渲染。\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003e链接默认禁用，显示来源提示，避免激活不可信链接。\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003e\u003ccode\u003edry-run\u003c/code\u003e、输出不覆盖、清晰错误提示。\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003e可选 \u003ccode\u003e.docx -\u0026gt; .md\u003c/code\u003e 转换器。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e安全边界\u003c/h2\u003e\n\u003cp data-block-index=\"32\" data-block-type=\"paragraph\"\u003e这个项目刻意保持保守：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003e不联网。\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e不上传文件。\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e不调用 AI API。\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e不从浏览器写回源文件。\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e不删除、移动、重命名源文件。\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e不启用 Markdown 链接。\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003e不在浏览器中解析 Office/PDF/EPUB。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"40\" data-block-type=\"paragraph\"\u003e生成的 HTML 会包含源文件正文。如果源文件有敏感内容，不要公开分享生成的 HTML。\u003c/p\u003e\n\u003ch2\u003e当前不承诺事项\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003e不承诺复杂 DOCX 版式完全还原。\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003e不承诺 \u003ccode\u003e.doc\u003c/code\u003e / \u003ccode\u003e.rtf\u003c/code\u003e / \u003ccode\u003e.pdf\u003c/code\u003e / \u003ccode\u003e.epub\u003c/code\u003e 支持。\u003c/li\u003e\u003cli data-block-index=\"43\" data-block-type=\"list-item\"\u003e不承诺图表、流程图、字符画自动重绘。\u003c/li\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003e不承诺 AI 返回结果合并。\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003e不承诺多用户协作或云同步。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e适合自定义的方向\u003c/h2\u003e\n\u003cp data-block-index=\"46\" data-block-type=\"paragraph\"\u003e这个项目适合被后来者按自己的工作流修改：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003e改 UI 文案和语言。\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e改批复动作和目标。\u003c/li\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003e改阅读布局宽度。\u003c/li\u003e\u003cli data-block-index=\"50\" data-block-type=\"list-item\"\u003e改 \u003ccode\u003ereview.md\u003c/code\u003e 导出格式。\u003c/li\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003e增加新的文件转换器。\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003e增加新的 Markdown 渲染规则。\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003e增加项目内部的固定配置模板。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"54\" data-block-type=\"paragraph\"\u003e建议自定义时优先保持三条边界：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003e源文件只读。\u003c/li\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003e浏览器不越权。\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003e生成内容可被普通 AI 或人类继续阅读。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e当前结论\u003c/h2\u003e\n\u003cp data-block-index=\"58\" data-block-type=\"paragraph\"\u003e当前版本已经达到可开源的基础状态。\u003c/p\u003e\n\u003cp data-block-index=\"59\" data-block-type=\"paragraph\"\u003e它不是大平台，而是一个小而清晰的工具：让本地 Markdown/TXT 文件夹可以被连续阅读、筛选、批复，并把批复变成 AI 友好的后续任务。\u003c/p\u003e", "content_text": "# 项目状态说明\n\n本文件说明 Local Markdown/TXT Review Reader 当前版本的定位、已完成能力、边界和后续方向。\n\n对应英文文件：`01-project-status.en.md`\n\n## 当前定位\n\n这个项目是一个本地优先的 Markdown/TXT 审阅阅读器。\n\n它的核心用途是：\n\n- 把一个文件夹里的 `.md` / `.txt` 文件打包成一本可阅读的单文件 HTML。\n- 在浏览器中搜索、筛选、连续翻篇。\n- 选中文本或段落，生成面向 AI 或人工后续处理的批复记录。\n- 导出按文件分组的 `review.md`。\n\n它不是：\n\n- Markdown 编辑器。\n- 在线 AI 客户端。\n- 文件管理器。\n- 知识库系统。\n- 文档站生成器。\n- 多格式万能转换器。\n\n## 当前稳定主链路\n\n当前主链路已经闭合：\n\n```text\n本地 Markdown/TXT 文件夹\n  -\u003e build_reader.py\n  -\u003e output/reader.html\n  -\u003e 浏览器阅读、筛选、批复\n  -\u003e 导出 review.md\n```\n\n重新打包 `review.md` 也已经验证可行：\n\n```text\nreview.md\n  -\u003e 作为普通 Markdown 文件重新进入阅读器\n  -\u003e 用于复读、归档、二次审阅\n```\n\n## 已完成能力\n\n- 递归或非递归读取 `.md` / `.txt`。\n- 自然排序、倒序、按修改时间排序。\n- 保留相对路径、文件名、扩展名、字数、修改时间。\n- 全文搜索标题、路径、文件名和正文。\n- 筛选结果即临时书单，上一篇/下一篇基于当前筛选结果。\n- 字体大小、阅读宽度、深色模式、左右栏宽度持久化。\n- 目录栏和审阅栏可折叠。\n- 支持段落级批复和选中文本批复。\n- 审阅板支持编辑、删除、清空、复制、下载。\n- `review.md` 按文件分组导出。\n- Markdown 表格、代码块、引用、列表、图片基础渲染。\n- 链接默认禁用，显示来源提示，避免激活不可信链接。\n- `dry-run`、输出不覆盖、清晰错误提示。\n- 可选 `.docx -\u003e .md` 转换器。\n\n## 安全边界\n\n这个项目刻意保持保守：\n\n- 不联网。\n- 不上传文件。\n- 不调用 AI API。\n- 不从浏览器写回源文件。\n- 不删除、移动、重命名源文件。\n- 不启用 Markdown 链接。\n- 不在浏览器中解析 Office/PDF/EPUB。\n\n生成的 HTML 会包含源文件正文。如果源文件有敏感内容，不要公开分享生成的 HTML。\n\n## 当前不承诺事项\n\n- 不承诺复杂 DOCX 版式完全还原。\n- 不承诺 `.doc` / `.rtf` / `.pdf` / `.epub` 支持。\n- 不承诺图表、流程图、字符画自动重绘。\n- 不承诺 AI 返回结果合并。\n- 不承诺多用户协作或云同步。\n\n## 适合自定义的方向\n\n这个项目适合被后来者按自己的工作流修改：\n\n- 改 UI 文案和语言。\n- 改批复动作和目标。\n- 改阅读布局宽度。\n- 改 `review.md` 导出格式。\n- 增加新的文件转换器。\n- 增加新的 Markdown 渲染规则。\n- 增加项目内部的固定配置模板。\n\n建议自定义时优先保持三条边界：\n\n- 源文件只读。\n- 浏览器不越权。\n- 生成内容可被普通 AI 或人类继续阅读。\n\n## 当前结论\n\n当前版本已经达到可开源的基础状态。\n\n它不是大平台，而是一个小而清晰的工具：让本地 Markdown/TXT 文件夹可以被连续阅读、筛选、批复，并把批复变成 AI 友好的后续任务。\n"}, {"id": "chapter-003", "title": "Release Checklist", "file_name": "02-release-checklist.en.md", "relative_path": "docs/02-release-checklist.en.md", "path": "docs/02-release-checklist.en.md", "folder": "docs", "path_segments": ["docs"], "prefix": "02", "ext": ".md", "word_count": 714, "modified_time": "2026-07-02T03:10:16", "content_html": "\u003ch1\u003eRelease Checklist\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eThis file records checks that should be completed or confirmed before release.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eChinese counterpart: \u003ccode\u003e02-release-checklist.zh-CN.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003eBuild Checks\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"3\" data-block-type=\"list-item\"\u003eBuild the default Chinese reader:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"4\" data-block-type=\"list-item\"\u003eBuild the English UI reader:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.en.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"5\" data-block-type=\"list-item\"\u003eBuild the converter sample reader:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.converted.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"6\" data-block-type=\"list-item\"\u003eBuild the documentation status reader:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"7\" data-block-type=\"list-item\"\u003eBuild the English UI documentation status reader:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.en.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003eRefresh selected public demo HTML files:\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/build_demos.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eAutomated Tests\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003eRun the smoke test:\u003c/li\u003e\u003c/ul\ 03e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003eSearch works.\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003ePrevious/next follows the current filter.\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003eThe review dialog opens.\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e\u003ccode\u003ereview.md\u003c/code\u003e can be copied or downloaded.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eSafety Checks\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003eThe build process does not modify source files.\u003c/li\u003e\u003cli data-block-index=\"50\" data-block-type=\"list-item\"\u003eThe browser reader does not write back to source files.\u003c/li\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003eMarkdown links do not generate clickable \u003ccode\u003e\u0026lt;a href=...\u0026gt;\u003c/code\u003e elements.\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003eTXT content is escaped as text and does not activate HTML or Markdown syntax.\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003eGenerated HTML contains source content, and README explains the sensitive-content risk.\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003eOptional converters read source documents and write converted outputs only.\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003eREADME and security notes warn against packaging Markdown/TXT from unknown sources or running optional converters on unknown Office documents.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eKnown Current Limits\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003eThe DOCX converter is suitable for basic text, headings, lists, tables, images, and some inline styles, but it does not guarantee complex layout fidelity.\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003eExported \u003ccode\u003ereview.md\u003c/code\u003e is review text, not a reversible structure file.\u003c/li\u003e\u003cli data-block-index=\"58\" data-block-type=\"list-item\"\u003eComplex charts, ASCII diagrams, and flowcharts are displayed as content rather than automatically redrawn.\u003c/li\u003e\u003cli data-block-index=\"59\" data-block-type=\"list-item\"\u003eLinks are disabled by default as a safety tradeoff; this is not a Markdown site generator.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eBefore Release\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"60\" data-block-type=\"list-item\"\u003eDo not commit the entire routine \u003ccode\u003eoutput/\u003c/code\u003e build folder.\u003c/li\u003e\u003cli data-block-index=\"61\" data-block-type=\"list-item\"\u003eIf the repository needs browser-ready HTML examples, commit selected regenerated demo files under a deliberate location such as \u003ccode\u003eexamples/generated/\u003c/code\u003e, and document the source config and build command.\u003c/li\u003e\u003cli data-block-index=\"62\" data-block-type=\"list-item\"\u003eKeep \u003ccode\u003eexamples/generated/basic-reader.demo.html\u003c/code\u003e, \u003ccode\u003eexamples/generated/basic-reader.en.demo.html\u003c/code\u003e, \u003ccode\u003eexamples/generated/project-docs.demo.html\u003c/code\u003e, and \u003ccode\u003eexamples/generated/project-docs.en.demo.html\u003c/code\u003e refreshed together before release.\u003c/li\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003eKeep test fixtures small and readable.\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003eKeep README Chinese-first with English internationalization notes.\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003eDo not put development governance logs or personal work records into the open-source folder.\u003c/li\u003e\u003cli data-block-index=\"66\" data-block-type=\"list-item\"\u003eConfirm the MIT \u003ccode\u003eLICENSE\u003c/code\u003e file is present.\u003c/li\u003e\u003cli data-block-index=\"67\" data-block-type=\"list-item\"\u003eRun the smoke test again before publishing.\u003c/li\u003e\u003c/ul\u003e", "content_text": "# Release Checklist\n\nThis file records checks that should be completed or confirmed before release.\n\nChinese counterpart: `02-release-checklist.zh-CN.md`\n\n## Build Checks\n\n- Build the default Chinese reader:\n\n```powershell\npython build_reader.py workspace.config.md --overwrite\n```\n\n- Build the English UI reader:\n\n```powershell\npython build_reader.py workspace.en.config.md --overwrite\n```\n\n- Build the converter sample reader:\n\n```powershell\npython build_reader.py workspace.converted.config.md --overwrite\n```\n\n- Build the documentation status reader:\n\n```powershell\npython build_reader.py workspace.docs.config.md --overwrite\n```\n\n- Build the English UI documentation status reader:\n\n```powershell\npython build_reader.py workspace.docs.en.config.md --overwrite\n```\n\n- Refresh selected public demo HTML files:\n\n```powershell\npython tools/build_demos.py\n```\n\n## Automated Tests\n\n- Run the smoke test:\n\n```powershell\npython tests/smoke_test.py\n```\n\nThe current smoke test covers:\n\n- Config parsing.\n- Basic Markdown/TXT rendering.\n- TXT rendering does not activate HTML, Markdown links, or image syntax.\n- Disabled links and localized placeholders.\n- Common raster image data URLs still render.\n- SVG data images are disabled.\n- Image data URLs not being corrupted by inline formatting.\n- Invalid `docx-table` fallback to code blocks.\n- Script-safe JSON escaping for embedded reader data.\n- `dry-run` writing no files.\n- `overwrite: false` preserving existing output.\n- Clear errors for missing `source_dir`.\n- Clear errors for empty or non-matching source folders.\n- Main reader, English reader, Chinese/English documentation readers, and converted reader builds.\n- Basic DOCX converter quality.\n- Recursive conversion without overwriting duplicate file names.\n- Selected generated demo HTML files exist and do not contain local absolute paths or private review markers.\n- README generated-demo links point to checked-in files.\n\n## Manual Checks\n\n- Three-column layout works on wide, half-width, and narrow screens.\n- Contents and review panels do not cover the reader after collapsing.\n- Previous/next navigation follows the current filter.\n- Font size, reading width, theme, and panel widths persist after refresh.\n- Review dialog can add review notes.\n- When browser selection mini menus appear, such as in Edge, the floating review button still works as an alternative to the `R` shortcut.\n- Review board can edit, delete, and clear review notes.\n- Copied and downloaded `review.md` is grouped by file.\n- Downloaded `review.md` can be repackaged as a normal Markdown reader.\n- Link placeholders, image display, and converted inline styles look correct in the browser.\n\n## GitHub Pages Checks\n\nIf GitHub Pages is enabled, open these pages after pushing:\n\n- Chinese basic demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html`\n- English basic demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html`\n- Chinese project docs demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html`\n- English project docs demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html`\n\nFor each public demo, confirm:\n\n- Search works.\n- Previous/next follows the current filter.\n- The review dialog opens.\n- `review.md` can be copied or downloaded.\n\n## Safety Checks\n\n- The build process does not modify source files.\n- The browser reader does not write back to source files.\n- Markdown links do not generate clickable `` elements.\n- TXT content is escaped as text and does not activate HTML or Markdown syntax.\n- Generated HTML contains source content, and README explains the sensitive-content risk.\n- Optional converters read source documents and write converted outputs only.\n- README and security notes warn against packaging Markdown/TXT from unknown sources or running optional converters on unknown Office documents.\n\n## Known Current Limits\n\n- The DOCX converter is suitable for basic text, headings, lists, tables, images, and some inline styles, but it does not guarantee complex layout fidelity.\n- Exported `review.md` is review text, not a reversible structure file.\n- Complex charts, ASCII diagrams, and flowcharts are displayed as content rather than automatically redrawn.\n- Links are disabled by default as a safety tradeoff; this is not a Markdown site generator.\n\n## Before Release\n\n- Do not commit the entire routine `output/` build folder.\n- If the repository needs browser-ready HTML examples, commit selected regenerated demo files under a deliberate location such as `examples/generated/`, and document the source config and build command.\n- Keep `examples/generated/basic-reader.demo.html`, `examples/generated/basic-reader.en.demo.html`, `examples/generated/project-docs.demo.html`, and `examples/generated/project-docs.en.demo.html` refreshed together before release.\n- Keep test fixtures small and readable.\n- Keep README Chinese-first with English internationalization notes.\n- Do not put development governance logs or personal work records into the open-source folder.\n- Confirm the MIT `LICENSE` file is present.\n- Run the smoke test again before publishing.\n"}, {"id": "chapter-004", "title": "发布检查清单", "file_name": "02-release-checklist.zh-CN.md", "relative_path": "docs/02-release-checklist.zh-CN.md", "path": "docs/02-release-checklist.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "02", "ext": ".md", "word_count": 1088, "modified_time": "2026-07-02T03:10:15", "content_html": "\u003ch1\u003e发布检查清单\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文件记录当前版本发布前应完成或确认的检查项。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e02-release-checklist.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e构建检查\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"3\" data-block-type=\"list-item\"\u003e运行默认中文构建：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"4\" data-block-type=\"list-item\"\u003e运行英文界面构建：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.en.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"5\" data-block-type=\"list-item\"\u003e运行转换器样例构建：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.converted.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"6\" data-block-type=\"list-item\"\u003e运行文档状态构建：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"7\" data-block-type=\"list-item\"\u003e运行英文界面文档状态构建：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.en.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cul\u003e\u003cli data-block-index=\"8\" data-block-type=\"list-item\"\u003e刷新公开 demo HTML：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/build_demos.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e自动测试\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"9\" data-block-type=\"list-item\"\u003e运行 smoke test：\u003c/li\u003e\u003c/ul\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tests/smoke_test.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003e当前 smoke test 覆盖：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003e配置解析。\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003eMarkdown/TXT 基础渲染。\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003eTXT 渲染不会激活 HTML、Markdown 链接或图片语法。\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eMarkdown 链接禁用和本地化占位。\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e常见 raster 图片 data URL 仍可显示。\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003eSVG data image 被禁用。\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003e图片 data URL 不被行内格式破坏。\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e坏 \u003ccode\u003edocx-table\u003c/code\u003e 回退为代码块。\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e嵌入 \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e 的 JSON 安全转义。\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e\u003ccode\u003edry-run\u003c/code\u003e 不写文件。\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e\u003ccode\u003eoverwrite: false\u003c/code\u003e 不覆盖已有输出。\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003e缺少 \u003ccode\u003esource_dir\u003c/code\u003e 的错误提示。\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003e空目录和匹配不到文件的错误提示。\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003e主阅读器、英文阅读器、中英文文档阅读器、转换器阅读器构建。\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003eDOCX 转换器基础质量。\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e递归转换同名文件时不覆盖。\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003e选择性提交的生成示例 HTML 存在，并且不包含本地绝对路径或私人批复标记。\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003eREADME 中列出的 generated demo 链接都指向已提交文件。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e手动检查\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003e三栏布局在大屏、半屏、窄屏下可用。\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003e目录栏和审阅栏折叠后不会遮挡正文。\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003e搜索后上一篇/下一篇基于当前筛选结果。\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003e字体大小、阅读宽度、主题和栏宽刷新后保留。\u003c/li\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003e审阅弹窗可以添加批复。\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003eEdge 等浏览器出现选中文本迷你菜单时，浮动批复按钮仍可作为 \u003ccode\u003eR\u003c/code\u003e 快捷键的替代入口。\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e审阅板可以编辑、删除、清空批复。\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e复制和下载的 \u003ccode\u003ereview.md\u003c/code\u003e 按文件分组。\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e下载的 \u003ccode\u003ereview.md\u003c/code\u003e 可以重新打包为普通 Markdown 阅读器。\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e链接占位、图片显示、转换器行内格式在浏览器中看起来正常。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eGitHub Pages 检查\u003c/h2\u003e\n\u003cp data-block-index=\"39\" data-block-type=\"paragraph\"\u003e如果启用了 GitHub Pages，推送后打开：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003e中文基础 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003e英文基础 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003e中文项目文档 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"43\" data-block-type=\"list-item\"\u003e英文项目文档 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"44\" data-block-type=\"paragraph\"\u003e每个公开 demo 至少确认：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003e搜索可用。\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003e上一篇/下一篇遵循当前筛选结果。\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003e审阅弹窗可打开。\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e\u003ccode\u003ereview.md\u003c/code\u003e 可以复制或下载。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e安全检查\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003e构建过程不修改源文件。\u003c/li\u003e\u003cli data-block-index=\"50\" data-block-type=\"list-item\"\u003e浏览器阅读器不写回源文件。\u003c/li\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003eMarkdown 链接不会生成可点击 \u003ccode\u003e\u0026lt;a href=...\u0026gt;\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003eTXT 内容只做转义展示，不激活 HTML 或 Markdown 语法。\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003e生成 HTML 包含源文件内容，README 已提示敏感内容风险。\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003e可选转换器只读取源文档并写入转换结果。\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003eREADME 和安全说明已提醒：不推荐打包来路不明的 Markdown/TXT，也不推荐对来路不明的 Office 文档运行转换器。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e当前已知限制\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"56\" data-block-type=\"list-item\"\u003eDOCX 转换器适合基础文本、标题、列表、表格、图片和部分行内样式，不承诺复杂版式。\u003c/li\u003e\u003cli data-block-index=\"57\" data-block-type=\"list-item\"\u003e导出的 \u003ccode\u003ereview.md\u003c/code\u003e 是批复文本，不是可逆结构文件。\u003c/li\u003e\u003cli data-block-index=\"58\" data-block-type=\"list-item\"\u003e复杂图表、字符画、流程图只做普通内容展示，不自动重绘。\u003c/li\u003e\u003cli data-block-index=\"59\" data-block-type=\"list-item\"\u003e链接默认不激活，这是安全取舍，不是 Markdown 站点功能。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e发布前建议\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"60\" data-block-type=\"list-item\"\u003e不提交日常构建产生的整个 \u003ccode\u003eoutput/\u003c/code\u003e 目录。\u003c/li\u003e\u003cli data-block-index=\"61\" data-block-type=\"list-item\"\u003e如果仓库需要一个可直接打开的 HTML 示例，应选择性提交重新生成的 demo 文件，例如放到 \u003ccode\u003eexamples/generated/\u003c/code\u003e，并在文档中写清楚生成命令和来源配置。\u003c/li\u003e\u003cli data-block-index=\"62\" data-block-type=\"list-item\"\u003e发布前保持 \u003ccode\u003eexamples/generated/basic-reader.demo.html\u003c/code\u003e、\u003ccode\u003eexamples/generated/basic-reader.en.demo.html\u003c/code\u003e、\u003ccode\u003eexamples/generated/project-docs.demo.html\u003c/code\u003e 和 \u003ccode\u003eexamples/generated/project-docs.en.demo.html\u003c/code\u003e 一起刷新。\u003c/li\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003e保持测试样例小而可读。\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003eREADME 中保留中文为主、英文国际化的说明。\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003e不把开发治理日志、个人工作记录放进开源目录。\u003c/li\u003e\u003cli data-block-index=\"66\" data-block-type=\"list-item\"\u003e确认 MIT \u003ccode\u003eLICENSE\u003c/code\u003e 文件存在。\u003c/li\u003e\u003cli data-block-index=\"67\" data-block-type=\"list-item\"\u003e发布前重新跑一次 smoke test。\u003c/li\u003e\u003c/ul\u003e", "content_text": "# 发布检查清单\n\n本文件记录当前版本发布前应完成或确认的检查项。\n\n对应英文文件：`02-release-checklist.en.md`\n\n## 构建检查\n\n- 运行默认中文构建：\n\n```powershell\npython build_reader.py workspace.config.md --overwrite\n```\n\n- 运行英文界面构建：\n\n```powershell\npython build_reader.py workspace.en.config.md --overwrite\n```\n\n- 运行转换器样例构建：\n\n```powershell\npython build_reader.py workspace.converted.config.md --overwrite\n```\n\n- 运行文档状态构建：\n\n```powershell\npython build_reader.py workspace.docs.config.md --overwrite\n```\n\n- 运行英文界面文档状态构建：\n\n```powershell\npython build_reader.py workspace.docs.en.config.md --overwrite\n```\n\n- 刷新公开 demo HTML：\n\n```powershell\npython tools/build_demos.py\n```\n\n## 自动测试\n\n- 运行 smoke test：\n\n```powershell\npython tests/smoke_test.py\n```\n\n当前 smoke test 覆盖：\n\n- 配置解析。\n- Markdown/TXT 基础渲染。\n- TXT 渲染不会激活 HTML、Markdown 链接或图片语法。\n- Markdown 链接禁用和本地化占位。\n- 常见 raster 图片 data URL 仍可显示。\n- SVG data image 被禁用。\n- 图片 data URL 不被行内格式破坏。\n- 坏 `docx-table` 回退为代码块。\n- 嵌入 `` 的 JSON 安全转义。\n- `dry-run` 不写文件。\n- `overwrite: false` 不覆盖已有输出。\n- 缺少 `source_dir` 的错误提示。\n- 空目录和匹配不到文件的错误提示。\n- 主阅读器、英文阅读器、中英文文档阅读器、转换器阅读器构建。\n- DOCX 转换器基础质量。\n- 递归转换同名文件时不覆盖。\n- 选择性提交的生成示例 HTML 存在，并且不包含本地绝对路径或私人批复标记。\n- README 中列出的 generated demo 链接都指向已提交文件。\n\n## 手动检查\n\n- 三栏布局在大屏、半屏、窄屏下可用。\n- 目录栏和审阅栏折叠后不会遮挡正文。\n- 搜索后上一篇/下一篇基于当前筛选结果。\n- 字体大小、阅读宽度、主题和栏宽刷新后保留。\n- 审阅弹窗可以添加批复。\n- Edge 等浏览器出现选中文本迷你菜单时，浮动批复按钮仍可作为 `R` 快捷键的替代入口。\n- 审阅板可以编辑、删除、清空批复。\n- 复制和下载的 `review.md` 按文件分组。\n- 下载的 `review.md` 可以重新打包为普通 Markdown 阅读器。\n- 链接占位、图片显示、转换器行内格式在浏览器中看起来正常。\n\n## GitHub Pages 检查\n\n如果启用了 GitHub Pages，推送后打开：\n\n- 中文基础 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html`\n- 英文基础 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html`\n- 中文项目文档 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html`\n- 英文项目文档 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html`\n\n每个公开 demo 至少确认：\n\n- 搜索可用。\n- 上一篇/下一篇遵循当前筛选结果。\n- 审阅弹窗可打开。\n- `review.md` 可以复制或下载。\n\n## 安全检查\n\n- 构建过程不修改源文件。\n- 浏览器阅读器不写回源文件。\n- Markdown 链接不会生成可点击 ``。\n- TXT 内容只做转义展示，不激活 HTML 或 Markdown 语法。\n- 生成 HTML 包含源文件内容，README 已提示敏感内容风险。\n- 可选转换器只读取源文档并写入转换结果。\n- README 和安全说明已提醒：不推荐打包来路不明的 Markdown/TXT，也不推荐对来路不明的 Office 文档运行转换器。\n\n## 当前已知限制\n\n- DOCX 转换器适合基础文本、标题、列表、表格、图片和部分行内样式，不承诺复杂版式。\n- 导出的 `review.md` 是批复文本，不是可逆结构文件。\n- 复杂图表、字符画、流程图只做普通内容展示，不自动重绘。\n- 链接默认不激活，这是安全取舍，不是 Markdown 站点功能。\n\n## 发布前建议\n\n- 不提交日常构建产生的整个 `output/` 目录。\n- 如果仓库需要一个可直接打开的 HTML 示例，应选择性提交重新生成的 demo 文件，例如放到 `examples/generated/`，并在文档中写清楚生成命令和来源配置。\n- 发布前保持 `examples/generated/basic-reader.demo.html`、`examples/generated/basic-reader.en.demo.html`、`examples/generated/project-docs.demo.html` 和 `examples/generated/project-docs.en.demo.html` 一起刷新。\n- 保持测试样例小而可读。\n- README 中保留中文为主、英文国际化的说明。\n- 不把开发治理日志、个人工作记录放进开源目录。\n- 确认 MIT `LICENSE` 文件存在。\n- 发布前重新跑一次 smoke test。\n"}, {"id": "chapter-005", "title": "Customization Guide", "file_name": "03-customization-guide.en.md", "relative_path": "docs/03-customization-guide.en.md", "path": "docs/03-customization-guide.en.md", "folder": "docs", "path_segments": ["docs"], "prefix": "03", "ext": ".md", "word_count": 580, "modified_time": "2026-07-02T01:08:18", "content_html": "\u003ch1\u003eCustomization Guide\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eThis file explains how future contributors can modify the project and which boundaries should remain intact.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eChinese counterpart: \u003ccode\u003e03-customization-guide.zh-CN.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003eMinimal Mental Model\u003c/h2\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003eThe project has only three layers:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eConfig file\n  -\u0026gt; Python build script\n  -\u0026gt; self-contained HTML reader\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003eThe config decides where to read from, how to sort files, UI labels, and review options.\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003eThe Python script scans files, renders Markdown/TXT, and generates HTML.\u003c/p\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eThe HTML reader handles browser-side reading, filtering, navigation, reviewing, and exporting.\u003c/p\u003e\n\u003ch2\u003eEmbed in an Existing Project\u003c/h2\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003eThis tool does not require users to adopt the full repository structure.\u003c/p\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003eFor a minimal integration into another project:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ecopy build_reader.py\ncopy or create workspace.config.md\npoint source_dir to your md/txt folder\npoint output to your output folder\nrun python build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003eIf you do not need DOCX conversion, you do not need to copy \u003ccode\u003etools/convert_docs.py\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003eIf you do not need local HTTP preview, you do not need to copy \u003ccode\u003eserve_reader.py\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003eRecommended embedded workflow:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003efiles from any source\n  -\u0026gt; package as reader.html\n  -\u0026gt; human review produces review.md\n  -\u0026gt; AI edits or generates a new version based on review.md\n  -\u0026gt; rebuild reader.html to inspect the result\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eCommon Customization Points\u003c/h2\u003e\n\u003ch3\u003eChange Source Folder\u003c/h3\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003eEdit the config file:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003esource_dir: ./examples/basic/drafts\nrecursive: true\ninclude:\n  - \u0026quot;*.md\u0026quot;\n  - \u0026quot;*.txt\u0026quot;\nexclude:\n  - \u0026quot;*private*\u0026quot;\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"13\" data-block-type=\"paragraph\"\u003e\u003ccode\u003esource_dir\u003c/code\u003e must stay inside the folder containing the config file.\u003c/p\u003e\n\u003ch3\u003eChange Output Path\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput: ./output/reader.html\noverwrite: false\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"14\" data-block-type=\"paragraph\"\u003eWhen \u003ccode\u003eoverwrite: false\u003c/code\u003e and the target already exists, the script writes a timestamped file instead.\u003c/p\u003e\n\u003ch3\u003eChange UI Language\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003elocale: zh-CN\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"15\" data-block-type=\"paragraph\"\u003eOr:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003elocale: en\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"16\" data-block-type=\"paragraph\"\u003eYou can also override individual strings with \u003ccode\u003elabels:\u003c/code\u003e.\u003c/p\u003e\n\u003ch3\u003eChange Review Actions and Targets\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ereview:\n  enabled: true\n  actions:\n    - revise\n    - summarize\n    - extract\n    - register\n  targets:\n    - source paragraph\n    - review queue\n    - notes\n    - todo list\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"17\" data-block-type=\"paragraph\"\u003eThe program does not need to interpret these fields as complex enums. They are exported into \u003ccode\u003ereview.md\u003c/code\u003e for users or AI tools to understand.\u003c/p\u003e\n\u003ch3\u003eChange TXT Paragraph Mode\u003c/h3\u003e\n\u003cdiv class=\"code-block\" data-language=\"yaml\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003eyaml\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003etext:\n  paragraph_mode: line\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"18\" data-block-type=\"paragraph\"\u003eOptions:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003eline\u003c/code\u003e: each non-empty line becomes a reviewable paragraph.\u003c/li\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e\u003ccode\u003eblank_line\u003c/code\u003e: blank lines split paragraphs.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eConverter Extensions\u003c/h2\u003e\n\u003cp data-block-index=\"21\" data-block-type=\"paragraph\"\u003eThe core reader only commits to \u003ccode\u003e.md\u003c/code\u003e / \u003ccode\u003e.txt\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"22\" data-block-type=\"paragraph\"\u003eFor more formats, add independent converters:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003esource.docx\n  -\u0026gt; tools/convert_docs.py\n  -\u0026gt; converted/source.docx.md\n  -\u0026gt; build_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"23\" data-block-type=\"paragraph\"\u003eDo not make the browser parse local Office/PDF files directly.\u003c/p\u003e\n\u003ch2\u003eRendering Rule Extensions\u003c/h2\u003e\n\u003cp data-block-index=\"24\" data-block-type=\"paragraph\"\u003eMarkdown rendering rules can be extended in \u003ccode\u003ebuild_reader.py\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"25\" data-block-type=\"paragraph\"\u003ePrefer to keep:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003eHTML output safe.\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003eLinks disabled by default.\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003eComplex structures falling back to readable text.\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003eOne bad file not breaking the whole project.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eReview Export Extensions\u003c/h2\u003e\n\u003cp data-block-index=\"30\" data-block-type=\"paragraph\"\u003eThe exported \u003ccode\u003ereview.md\u003c/code\u003e format can be adapted for team workflows.\u003c/p\u003e\n\u003cp data-block-index=\"31\" data-block-type=\"paragraph\"\u003eThe main logic lives in the embedded JavaScript \u003ccode\u003ereviewMarkdown()\u003c/code\u003e function.\u003c/p\u003e\n\u003cp data-block-index=\"32\" data-block-type=\"paragraph\"\u003eRecommended fields to keep:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003eFile path.\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003eTitle.\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003eParagraph number.\u003c/li\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003eAction.\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003eTarget.\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003eOriginal quote.\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003eUser instruction.\u003c/li\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003eCreated time.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"41\" data-block-type=\"paragraph\"\u003eThese fields help AI tools or humans locate the context later.\u003c/p\u003e\n\u003ch2\u003eBoundaries Not Recommended for First Customizations\u003c/h2\u003e\n\u003cp data-block-index=\"42\" data-block-type=\"paragraph\"\u003eAvoid adding these to the default path in a first customization pass:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"43\" data-block-type=\"list-item\"\u003eBrowser write-back to source files.\u003c/li\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003eAutomatic AI API calls.\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003eAutomatic merging of AI edits.\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003eBackground service dependency.\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003enpm frontend build chain.\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003eComplex chart libraries.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"49\" data-block-type=\"paragraph\"\u003eThese can be explored in separate branches, but they do not fit the default path of this small tool.\u003c/p\u003e\n\u003ch2\u003eWhat a Good Custom Version Looks Like\u003c/h2\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003eA good custom version should:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003eStill build with one command.\u003c/li\u003e\u003cli data-block-index=\"52\" data-block-type=\"list-item\"\u003eStill keep source files read-only.\u003c/li\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003eStill validate the core path with the smoke test.\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003eExplain its changes in README.\u003c/li\u003e\u003cli data-block-index=\"55\" data-block-type=\"list-item\"\u003eInclude examples that help strangers understand the use case quickly.\u003c/li\u003e\u003c/ul\u003e", "content_text": "# Customization Guide\n\nThis file explains how future contributors can modify the project and which boundaries should remain intact.\n\nChinese counterpart: `03-customization-guide.zh-CN.md`\n\n## Minimal Mental Model\n\nThe project
