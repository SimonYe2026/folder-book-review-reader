ype=\"paragraph\"\u003e如果源文件包含敏感信息，生成的 HTML 也会包含这些信息。\u003c/p\u003e\n\u003cp data-block-index=\"41\" data-block-type=\"paragraph\"\u003e不要把包含敏感内容的 HTML 上传到公开平台，也不要直接发给不该看到这些内容的人。\u003c/p\u003e\n\u003ch2\u003elocalStorage 说明\u003c/h2\u003e\n\u003cp data-block-index=\"42\" data-block-type=\"paragraph\"\u003e阅读设置和批复会保存到浏览器 \u003ccode\u003elocalStorage\u003c/code\u003e。\u003c/p\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003e这意味着：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003e刷新页面后批复可以恢复。\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003e同一浏览器、同一页面来源下可能保留历史批复。\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003e如果使用本地 HTTP 服务，状态会按该本地地址保存。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"47\" data-block-type=\"paragraph\"\u003e如果内容敏感，发布或演示前请清空批复，或换一个干净浏览器环境。\u003c/p\u003e\n\u003ch2\u003e本地服务说明\u003c/h2\u003e\n\u003cp data-block-index=\"48\" data-block-type=\"paragraph\"\u003e\u003ccode\u003eserve_reader.py\u003c/code\u003e 默认绑定：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e127.0.0.1\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"49\" data-block-type=\"paragraph\"\u003e这是本机访问地址。\u003c/p\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003e不建议把服务绑定到公网或局域网可访问地址。因为本地服务会把项目目录作为静态文件根目录提供访问。\u003c/p\u003e\n\u003ch2\u003e转换器说明\u003c/h2\u003e\n\u003cp data-block-index=\"51\" data-block-type=\"paragraph\"\u003e可选 DOCX 转换器会读取 \u003ccode\u003e.docx\u003c/code\u003e 并生成 Markdown。\u003c/p\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003e转换器不修改源文件，但仍不建议处理来路不明的 Office 文档。未知文档可能非常大、结构异常，或包含转换器尚未覆盖的复杂内容。\u003c/p\u003e\n\u003ch2\u003e推荐使用方式\u003c/h2\u003e\n\u003cp data-block-index=\"53\" data-block-type=\"paragraph\"\u003e更稳妥的流程是：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e确认来源可信\n  -\u0026gt; dry-run 查看读取范围\n  -\u0026gt; 构建 reader.html\n  -\u0026gt; 本地打开阅读\n  -\u0026gt; 导出 review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"54\" data-block-type=\"paragraph\"\u003e如果只是想查看陌生 Markdown 内容，建议先用普通文本编辑器打开检查，再决定是否打包进阅读器。\u003c/p\u003e", "content_text": "# 安全说明\n\n本文件说明本项目的安全模型、已有防护和仍然需要用户注意的风险。\n\n对应英文文件：`05-security-notes.en.md`\n\n## 基本判断\n\n这个工具是本地优先、只读源文件的阅读器。\n\n它做了多层防护，但不建议用户打包和打开来路不明的 Markdown/TXT 文件。\n\n原因很简单：打包过程会把输入文件内容放进一个浏览器页面里。即使脚本已经尽量转义、禁用链接和限制图片，未知输入仍然可能带来显示异常、性能压力、误导性内容或未发现的边界问题。\n\n## 已有防护\n\n当前版本已经做了这些防护：\n\n- 源文件只读，构建过程不修改源章节。\n- `source_dir` 和 `output` 必须留在配置文件所在项目目录内。\n- Markdown 链接默认不生成可点击 ``。\n- 链接会显示为“未知链接，请回源文件查看”这类占位提示。\n- 图片 URL 禁止 `javascript:` 等协议。\n- `data:image/...` 仅允许常见 raster 图片类型：png、jpg、jpeg、gif、webp。\n- 嵌入到 `` 中的 JSON 会转义 ``、`\u0026`，避免 `` 注入。\n- 异常 `docx-table` 会回退为代码块，而不是中断构建。\n- `dry-run` 可以在写出文件前查看读取范围。\n- `overwrite: false` 时不会覆盖已有输出。\n\n## MD、TXT 和 DOCX 的防护边界\n\n这些防护并不是只针对 Markdown。\n\n进入阅读器后的内容都会受到最终 HTML 打包层的保护：\n\n- `.md`：走 Markdown 基础渲染。链接会被禁用，图片会被限制，嵌入 JSON 会被安全转义。\n- `.txt`：不解释 Markdown，直接做 HTML 转义。即使文本里写了 ``、`[link](javascript:...)` 或图片语法，也只会作为普通文本显示。\n- `.docx`：不会被浏览器直接读取。它需要先通过可选转换器变成 `.md`，然后再进入 Markdown 阅读器的同一套防护。\n\n需要注意的是：DOCX 转换器本身属于转换阶段，不等同于浏览器阅读阶段。\n\n所以更准确的说法是：\n\n```text\nTXT 在阅读器内更保守；\nMD 在阅读器内被限制渲染；\nDOCX 转成 MD 后享受同一套阅读器防护，但转换器阶段仍不建议处理不可信 Office 文件。\n```\n\n## 仍然不建议处理不可信输入\n\n请尽量只打包你自己生成、自己下载后已确认来源、或来自可信协作者的 Markdown/TXT。\n\n不建议直接打包：\n\n- 来路不明的 Markdown。\n- 来路不明的 TXT。\n- 未审查的 AI 批量生成文件。\n- 来路不明的 DOCX 或其他 Office 文档。\n- 从网页、邮件、聊天工具里直接复制来的大块内容。\n- 包含大量超长行、超大 base64、异常嵌套表格的文件。\n- 你不准备暴露给浏览器页面的数据。\n\n这些输入即使不一定造成脚本执行，也可能带来：\n\n- 页面体积过大。\n- 浏览器卡顿。\n- 内容误导。\n- 搜索和批复定位困难。\n- 未知渲染边界。\n\n## 生成 HTML 的敏感性\n\n生成的 `reader.html` 是内容打包文件，不是空壳索引。\n\n如果源文件包含敏感信息，生成的 HTML 也会包含这些信息。\n\n不要把包含敏感内容的 HTML 上传到公开平台，也不要直接发给不该看到这些内容的人。\n\n## localStorage 说明\n\n阅读设置和批复会保存到浏览器 `localStorage`。\n\n这意味着：\n\n- 刷新页面后批复可以恢复。\n- 同一浏览器、同一页面来源下可能保留历史批复。\n- 如果使用本地 HTTP 服务，状态会按该本地地址保存。\n\n如果内容敏感，发布或演示前请清空批复，或换一个干净浏览器环境。\n\n## 本地服务说明\n\n`serve_reader.py` 默认绑定：\n\n```text\n127.0.0.1\n```\n\n这是本机访问地址。\n\n不建议把服务绑定到公网或局域网可访问地址。因为本地服务会把项目目录作为静态文件根目录提供访问。\n\n## 转换器说明\n\n可选 DOCX 转换器会读取 `.docx` 并生成 Markdown。\n\n转换器不修改源文件，但仍不建议处理来路不明的 Office 文档。未知文档可能非常大、结构异常，或包含转换器尚未覆盖的复杂内容。\n\n## 推荐使用方式\n\n更稳妥的流程是：\n\n```text\n确认来源可信\n  -\u003e dry-run 查看读取范围\n  -\u003e 构建 reader.html\n  -\u003e 本地打开阅读\n  -\u003e 导出 review.md\n```\n\n如果只是想查看陌生 Markdown 内容，建议先用普通文本编辑器打开检查，再决定是否打包进阅读器。\n"}, {"id": "chapter-011", "title": "Developer Guide: Architecture and Extension Paths", "file_name": "06-developer-guide.en.md", "relative_path": "docs/06-developer-guide.en.md", "path": "docs/06-developer-guide.en.md", "folder": "docs", "path_segments": ["docs"], "prefix": "06", "ext": ".md", "word_count": 769, "modified_time": "2026-07-02T01:26:12", "content_html": "\u003ch1\u003eDeveloper Guide: Architecture and Extension Paths\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eThis document is for people who want to modify, embed, or continue developing the project. It describes the current architecture, stable boundaries, and recommended extension order. It does not mean that every direction is on the release roadmap.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eChinese counterpart: \u003ccode\u003e06-developer-guide.zh-CN.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003eCurrent Stable Baseline\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eworkspace.config.md\n  -\u0026gt; build_reader.py scans, parses, and packages files\n  -\u0026gt; one self-contained reader.html\n  -\u0026gt; the browser reads, filters, reviews, and exports review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003ePython owns file-system access and generation. The browser only handles data already packaged into the page. The reader does not use the network, write back to source files, or call AI directly.\u003c/p\u003e\n\u003ch2\u003eMain Code Boundaries\u003c/h2\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e\u003ccode\u003ebuild_reader.py\u003c/code\u003e currently contains four kinds of responsibility:\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003e1. configuration parsing and path safety checks; 2. file scanning, sorting, and chapter-data generation; 3. safe Markdown/TXT-to-HTML conversion; 4. assembly of the HTML, CSS, and JavaScript application.\u003c/p\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eThe optional DOCX converter lives in \u003ccode\u003etools/convert_docs.py\u003c/code\u003e. It is a preprocessing step, and Office parsing should not be moved into the browser.\u003c/p\u003e\n\u003ch2\u003eRecommended Extension Order\u003c/h2\u003e\n\u003ch3\u003e1. Extend configuration first\u003c/h3\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003eUI labels, review actions, review targets, filtering rules, and display defaults should be extended through configuration first. A capability that can be expressed in configuration does not require a new runtime dependency.\u003c/p\u003e\n\u003ch3\u003e2. Extend structured data next\u003c/h3\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003eBefore adding reading or review behavior, define the fields required in chapter and review data, then change the UI. File paths, block numbers, quoted source text, and creation times are foundational fields for locating a review.\u003c/p\u003e\n\u003ch3\u003e3. Split generated assets into source modules\u003c/h3\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003eIf \u003ccode\u003ebuild_reader.py\u003c/code\u003e keeps growing, first move the template, CSS, and JavaScript into separate source files, then inline them during the build. This improves maintainability while preserving the one-command workflow and single-file output.\u003c/p\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003eSuggested structure:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ebuild_reader.py\nreader_src/\n  template.html\n  reader.css\n  reader.js\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch3\u003e4. Evaluate a frontend framework last\u003c/h3\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003eThe native \u003ccode\u003e\u0026lt;dialog\u0026gt;\u003c/code\u003e element is sufficient for the review dialog. It already provides modality, focus management, Escape handling, and form semantics. A framework is not justified for the dialog alone.\u003c/p\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003eIf the review board gains more state, components, and localized updates, evaluate the official Vue production runtime. This means the slim production runtime published by Vue, not a locally modified Vue source tree. Pin the version and distribute it locally or inline it at build time so the output remains offline and self-contained.\u003c/p\u003e\n\u003cp data-block-index=\"13\" data-block-type=\"paragraph\"\u003ejQuery simplifies some DOM syntax but does not solve reactive state or component-boundary problems, so it is not the recommended evolution path. Evaluate a UI component library only when the project genuinely needs many consistent complex controls.\u003c/p\u003e\n\u003ch2\u003eDirections Worth Exploring\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eclearer Python module boundaries and separated template assets;\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003ecomponentization and more granular state updates for the review board;\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003epluggable input converters with Markdown/TXT or an explicit intermediate structure as the common output;\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003estronger keyboard and accessibility support;\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003esearch performance and incremental rendering for large file collections;\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003eexport-format adapters so different AI or team workflows can reuse the same review data.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"20\" data-block-type=\"paragraph\"\u003eTable polish, small statistics, and additional visual components are UI increments. They remain lower priority than the reading, filtering, review, and export path.\u003c/p\u003e\n\u003ch2\u003eDirections Not Recommended as Direct Extensions\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003esilently scanning or writing local files from the browser;\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003ecalling AI APIs from the default reader;\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003eautomatically merging AI results;\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003eparsing DOCX/PDF/EPUB directly in the browser;\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003eguessing and redrawing complex diagrams from character art;\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003eadding a complete frontend toolchain for one control.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"27\" data-block-type=\"paragraph\"\u003eThese directions change the security boundary or product role. They belong in a separate branch, plugin, or project.\u003c/p\u003e\n\u003ch2\u003eMinimum Verification After Changes\u003c/h2\u003e\n\u003cp data-block-index=\"28\" data-block-type=\"paragraph\"\u003eRun at least:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tests\\smoke_test.py\npython build_reader.py workspace.config.md --dry-run\npython build_reader.py workspace.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"29\" data-block-type=\"paragraph\"\u003eFor frontend interaction changes, also verify manually:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003eprevious/next navigation stays inside filtered results;\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003ecollapsing the table of contents or review board does not collapse the reader;\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003ereview-board updates do not interrupt Chinese IME composition;\u003c/li\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003esettings and reviews recover from localStorage after refresh;\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003ea downloaded \u003ccode\u003ereview.md\u003c/code\u003e can be repackaged and read as ordinary Markdown;\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003euntrusted links stay disabled and text or embedded data cannot become executable script.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eCompatibility Principles\u003c/h2\u003e\n\u003cp data-block-index=\"36\" data-block-type=\"paragraph\"\u003eA good extension should preserve, where possible:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003eone Python command for the build;\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003eself-contained HTML output;\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003eoffline operation with no telemetry or network dependency by default;\u003c/li\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003eread-only source files and side-channel review export;\u003c/li\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003ecorrespondence between the default Chinese UI and English internationalization files;\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003eexamples, documentation, and regression tests for new behavior.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003ePreserve these properties before adding technical layers. The value of this project is not the number of frameworks it uses, but the reliable small loop it creates between local documents, human judgment, and later AI-assisted work.\u003c/p\u003e", "content_text": "# Developer Guide: Architecture and Extension Paths\n\nThis document is for people who want to modify, embed, or continue developing the project. It describes the current architecture, stable boundaries, and recommended extension order. It does not mean that every direction is on the release roadmap.\n\nChinese counterpart: `06-developer-guide.zh-CN.md`\n\n## Current Stable Baseline\n\n```text\nworkspace.config.md\n  -\u003e build_reader.py scans, parses, and packages files\n  -\u003e one self-contained reader.html\n  -\u003e the browser reads, filters, reviews, and exports review.md\n```\n\nPython owns file-system access and generation. The browser only handles data already packaged into the page. The reader does not use the network, write back to source files, or call AI directly.\n\n## Main Code Boundaries\n\n`build_reader.py` currently contains four kinds of responsibility:\n\n1. configuration parsing and path safety checks;\n2. file scanning, sorting, and chapter-data generation;\n3. safe Markdown/TXT-to-HTML conversion;\n4. assembly of the HTML, CSS, and JavaScript application.\n\nThe optional DOCX converter lives in `tools/convert_docs.py`. It is a preprocessing step, and Office parsing should not be moved into the browser.\n\n## Recommended Extension Order\n\n### 1. Extend configuration first\n\nUI labels, review actions, review targets, filtering rules, and display defaults should be extended through configuration first. A capability that can be expressed in configuration does not require a new runtime dependency.\n\n### 2. Extend structured data next\n\nBefore adding reading or review behavior, define the fields required in chapter and review data, then change the UI. File paths, block numbers, quoted source text, and creation times are foundational fields for locating a review.\n\n### 3. Split generated assets into source modules\n\nIf `build_reader.py` keeps growing, first move the template, CSS, and JavaScript into separate source files, then inline them during the build. This improves maintainability while preserving the one-command workflow and single-file output.\n\nSuggested structure:\n\n```text\nbuild_reader.py\nreader_src/\n  template.html\n  reader.css\n  reader.js\n```\n\n### 4. Evaluate a frontend framework last\n\nThe native `` element is sufficient for the review dialog. It already provides modality, focus management, Escape handling, and form semantics. A framework is not justified for the dialog alone.\n\nIf the review board gains more state, components, and localized updates, evaluate the official Vue production runtime. This means the slim production runtime published by Vue, not a locally modified Vue source tree. Pin the version and distribute it locally or inline it at build time so the output remains offline and self-contained.\n\njQuery simplifies some DOM syntax but does not solve reactive state or component-boundary problems, so it is not the recommended evolution path. Evaluate a UI component library only when the project genuinely needs many consistent complex controls.\n\n## Directions Worth Exploring\n\n- clearer Python module boundaries and separated template assets;\n- componentization and more granular state updates for the review board;\n- pluggable input converters with Markdown/TXT or an explicit intermediate structure as the common output;\n- stronger keyboard and accessibility support;\n- search performance and incremental rendering for large file collections;\n- export-format adapters so different AI or team workflows can reuse the same review data.\n\nTable polish, small statistics, and additional visual components are UI increments. They remain lower priority than the reading, filtering, review, and export path.\n\n## Directions Not Recommended as Direct Extensions\n\n- silently scanning or writing local files from the browser;\n- calling AI APIs from the default reader;\n- automatically merging AI results;\n- parsing DOCX/PDF/EPUB directly in the browser;\n- guessing and redrawing complex diagrams from character art;\n- adding a complete frontend toolchain for one control.\n\nThese directions change the security boundary or product role. They belong in a separate branch, plugin, or project.\n\n## Minimum Verification After Changes\n\nRun at least:\n\n```powershell\npython tests\\smoke_test.py\npython build_reader.py workspace.config.md --dry-run\npython build_reader.py workspace.config.md --overwrite\n```\n\nFor frontend interaction changes, also verify manually:\n\n- previous/next navigation stays inside filtered results;\n- collapsing the table of contents or review board does not collapse the reader;\n- review-board updates do not interrupt Chinese IME composition;\n- settings and reviews recover from localStorage after refresh;\n- a downloaded `review.md` can be repackaged and read as ordinary Markdown;\n- untrusted links stay disabled and text or embedded data cannot become executable script.\n\n## Compatibility Principles\n\nA good extension should preserve, where possible:\n\n- one Python command for the build;\n- self-contained HTML output;\n- offline operation with no telemetry or network dependency by default;\n- read-only source files and side-channel review export;\n- correspondence between the default Chinese UI and English internationalization files;\n- examples, documentation, and regression tests for new behavior.\n\nPreserve these properties before adding technical layers. The value of this project is not the number of frameworks it uses, but the reliable small loop it creates between local documents, human judgment, and later AI-assisted work.\n"}, {"id": "chapter-012", "title": "开发者指南：架构与后续扩展", "file_name": "06-developer-guide.zh-CN.md", "relative_path": "docs/06-developer-guide.zh-CN.md", "path": "docs/06-developer-guide.zh-CN.md", "folder": "docs", "path_segments": ["docs"], "prefix": "06", "ext": ".md", "word_count": 1260, "modified_time": "2026-07-02T01:26:10", "content_html": "\u003ch1\u003e开发者指南：架构与后续扩展\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e本文面向准备修改、嵌入或继续开发本项目的人。它描述当前架构、稳定边界和建议扩展顺序，不代表所有方向都已进入版本计划。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e对应英文文件：\u003ccode\u003e06-developer-guide.en.md\u003c/code\u003e\u003c/p\u003e\n\u003ch2\u003e当前稳定基线\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eworkspace.config.md\n  -\u0026gt; build_reader.py 扫描、解析和打包\n  -\u0026gt; 单个自包含 reader.html\n  -\u0026gt; 浏览器阅读、筛选、批复和导出 review.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003ePython 负责文件系统能力和生成过程；浏览器只处理已经打包的数据。阅读器不联网、不写回源文件，也不直接调用 AI。\u003c/p\u003e\n\u003ch2\u003e代码中的主要边界\u003c/h2\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e\u003ccode\u003ebuild_reader.py\u003c/code\u003e 当前同时包含四类职责：\u003c/p\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003e1. 配置解析和路径安全检查； 2. 文件扫描、排序和章节数据生成； 3. Markdown/TXT 到安全 HTML 的转换； 4. HTML、CSS 和 JavaScript 应用的组装。\u003c/p\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003e可选 DOCX 转换器位于 \u003ccode\u003etools/convert_docs.py\u003c/code\u003e。它属于阅读器前置链路，不应让浏览器直接承担 Office 文件解析。\u003c/p\u003e\n\u003ch2\u003e推荐扩展顺序\u003c/h2\u003e\n\u003ch3\u003e1. 先增加配置能力\u003c/h3\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003e界面文案、批复动作、批复目标、筛选规则和显示默认值，应优先通过配置扩展。配置可解决的问题，不必先增加新的运行时依赖。\u003c/p\u003e\n\u003ch3\u003e2. 再扩展结构化数据\u003c/h3\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003e新增阅读或审阅能力时，先明确章节数据和批复数据需要哪些字段，再修改界面。文件路径、段落编号、引用原文和创建时间是批复定位的基础字段。\u003c/p\u003e\n\u003ch3\u003e3. 将生成资源拆成源码模块\u003c/h3\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003e当 \u003ccode\u003ebuild_reader.py\u003c/code\u003e 继续增长时，推荐先把模板、CSS 和 JavaScript 拆成独立源码文件，构建时再内嵌到单个 HTML。这样能改善维护性，同时保持用户看到的一条命令和单文件产物不变。\u003c/p\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003e建议结构：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ebuild_reader.py\nreader_src/\n  template.html\n  reader.css\n  reader.js\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch3\u003e4. 最后评估前端框架\u003c/h3\u003e\n\u003cp data-block-index=\"11\" data-block-type=\"paragraph\"\u003e当前原生 \u003ccode\u003e\u0026lt;dialog\u0026gt;\u003c/code\u003e 足以承担批复弹窗，它已经提供模态层、焦点管理、Escape 关闭和表单语义。仅为了弹窗，不值得引入框架。\u003c/p\u003e\n\u003cp data-block-index=\"12\" data-block-type=\"paragraph\"\u003e如果审阅板继续增加状态、组件和局部更新，可以评估 Vue 官方生产版 runtime。这里指官方发布的精简生产运行时，不是自行删改 Vue 源码。建议固定版本并本地分发或在构建时内嵌，避免 CDN 依赖，继续保持离线和自包含输出。\u003c/p\u003e\n\u003cp data-block-index=\"13\" data-block-type=\"paragraph\"\u003ejQuery 只会简化部分 DOM 写法，不能解决响应式状态和组件边界问题，因此不是推荐演进方向。UI 组件库只有在确实需要大量一致的复杂控件时再评估。\u003c/p\u003e\n\u003ch2\u003e值得继续探索的方向\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003e更清晰的 Python 模块边界和模板资源拆分；\u003c/li\u003e\u003cli data-block-index=\"15\" data-block-type=\"list-item\"\u003e审阅板的组件化与更细粒度状态更新；\u003c/li\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e可插拔的输入转换器，但统一输出 Markdown/TXT 或明确的中间数据结构；\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003e更完整的键盘和无障碍支持；\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e面向大型文件集合的搜索性能和按需渲染；\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e导出格式适配器，让不同 AI 或团队流程复用同一批复数据。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"20\" data-block-type=\"paragraph\"\u003e表格增强、小统计和更多视觉组件属于 UI 增量，优先级低于阅读、筛选、批复和导出主链路。\u003c/p\u003e\n\u003ch2\u003e不建议直接扩展的方向\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e浏览器静默扫描或写回本地文件；\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003e在默认阅读器中调用 AI API；\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003e自动合并 AI 返回结果；\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003e让浏览器直接解析 DOCX/PDF/EPUB；\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003e根据字符画猜测并重绘复杂图表；\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e为单个控件引入完整前端工程链。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"27\" data-block-type=\"paragraph\"\u003e这些方向会改变安全边界或产品定位，适合独立分支、插件或另一个项目。\u003c/p\u003e\n\u003ch2\u003e修改后的最低验证\u003c/h2\u003e\n\u003cp data-block-index=\"28\" data-block-type=\"paragraph\"\u003e每次修改至少运行：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tests\\smoke_test.py\npython build_reader.py workspace.config.md --dry-run\npython build_reader.py workspace.config.md --overwrite\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"29\" data-block-type=\"paragraph\"\u003e涉及前端交互时，还应人工检查：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003e搜索后上一篇/下一篇只在筛选结果中移动；\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003e目录和审阅板折叠不挤掉正文；\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003e中文输入法不会被审阅板重绘打断；\u003c/li\u003e\u003cli data-block-index=\"33\" data-block-type=\"list-item\"\u003e刷新后设置和批复能从 localStorage 恢复；\u003c/li\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e下载的 \u003ccode\u003ereview.md\u003c/code\u003e 可重新打包并作为普通 Markdown 阅读；\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003e不可信链接保持禁用，文本和内嵌数据不会变成可执行脚本。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e兼容性原则\u003c/h2\u003e\n\u003cp data-block-index=\"36\" data-block-type=\"paragraph\"\u003e一个好的扩展应尽量保持：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e一条 Python 命令完成构建；\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e最终仍可生成自包含 HTML；\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003e默认离线、无遥测、无网络依赖；\u003c/li\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003e源文件只读，批复旁路导出；\u003c/li\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003e中文默认界面与英文国际化文件保持对应；\u003c/li\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003e新能力有示例、文档和回归测试。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003e先守住这些性质，再增加技术层次。这个项目的价值不在于使用了多少框架，而在于它把本地文档、人工判断和 AI 后续处理连接成了一个可靠的小闭环。\u003c/p\u003e", "content_text": "# 开发者指南：架构与后续扩展\n\n本文面向准备修改、嵌入或继续开发本项目的人。它描述当前架构、稳定边界和建议扩展顺序，不代表所有方向都已进入版本计划。\n\n对应英文文件：`06-developer-guide.en.md`\n\n## 当前稳定基线\n\n```text\nworkspace.config.md\n  -\u003e build_reader.py 扫描、解析和打包\n  -\u003e 单个自包含 reader.html\n  -\u003e 浏览器阅读、筛选、批复和导出 review.md\n```\n\nPython 负责文件系统能力和生成过程；浏览器只处理已经打包的数据。阅读器不联网、不写回源文件，也不直接调用 AI。\n\n## 代码中的主要边界\n\n`build_reader.py` 当前同时包含四类职责：\n\n1. 配置解析和路径安全检查；\n2. 文件扫描、排序和章节数据生成；\n3. Markdown/TXT 到安全 HTML 的转换；\n4. HTML、CSS 和 JavaScript 应用的组装。\n\n可选 DOCX 转换器位于 `tools/convert_docs.py`。它属于阅读器前置链路，不应让浏览器直接承担 Office 文件解析。\n\n## 推荐扩展顺序\n\n### 1. 先增加配置能力\n\n界面文案、批复动作、批复目标、筛选规则和显示默认值，应优先通过配置扩展。配置可解决的问题，不必先增加新的运行时依赖。\n\n### 2. 再扩展结构化数据\n\n新增阅读或审阅能力时，先明确章节数据和批复数据需要哪些字段，再修改界面。文件路径、段落编号、引用原文和创建时间是批复定位的基础字段。\n\n### 3. 将生成资源拆成源码模块\n\n当 `build_reader.py` 继续增长时，推荐先把模板、CSS 和 JavaScript 拆成独立源码文件，构建时再内嵌到单个 HTML。这样能改善维护性，同时保持用户看到的一条命令和单文件产物不变。\n\n建议结构：\n\n```text\nbuild_reader.py\nreader_src/\n  template.html\n  reader.css\n  reader.js\n```\n\n### 4. 最后评估前端框架\n\n当前原生 `` 足以承担批复弹窗，它已经提供模态层、焦点管理、Escape 关闭和表单语义。仅为了弹窗，不值得引入框架。\n\n如果审阅板继续增加状态、组件和局部更新，可以评估 Vue 官方生产版 runtime。这里指官方发布的精简生产运行时，不是自行删改 Vue 源码。建议固定版本并本地分发或在构建时内嵌，避免 CDN 依赖，继续保持离线和自包含输出。\n\njQuery 只会简化部分 DOM 写法，不能解决响应式状态和组件边界问题，因此不是推荐演进方向。UI 组件库只有在确实需要大量一致的复杂控件时再评估。\n\n## 值得继续探索的方向\n\n- 更清晰的 Python 模块边界和模板资源拆分；\n- 审阅板的组件化与更细粒度状态更新；\n- 可插拔的输入转换器，但统一输出 Markdown/TXT 或明确的中间数据结构；\n- 更完整的键盘和无障碍支持；\n- 面向大型文件集合的搜索性能和按需渲染；\n- 导出格式适配器，让不同 AI 或团队流程复用同一批复数据。\n\n表格增强、小统计和更多视觉组件属于 UI 增量，优先级低于阅读、筛选、批复和导出主链路。\n\n## 不建议直接扩展的方向\n\n- 浏览器静默扫描或写回本地文件；\n- 在默认阅读器中调用 AI API；\n- 自动合并 AI 返回结果；\n- 让浏览器直接解析 DOCX/PDF/EPUB；\n- 根据字符画猜测并重绘复杂图表；\n- 为单个控件引入完整前端工程链。\n\n这些方向会改变安全边界或产品定位，适合独立分支、插件或另一个项目。\n\n## 修改后的最低验证\n\n每次修改至少运行：\n\n```powershell\npython tests\\smoke_test.py\npython build_reader.py workspace.config.md --dry-run\npython build_reader.py workspace.config.md --overwrite\n```\n\n涉及前端交互时，还应人工检查：\n\n- 搜索后上一篇/下一篇只在筛选结果中移动；\n- 目录和审阅板折叠不挤掉正文；\n- 中文输入法不会被审阅板重绘打断；\n- 刷新后设置和批复能从 localStorage 恢复；\n- 下载的 `review.md` 可重新打包并作为普通 Markdown 阅读；\n- 不可信链接保持禁用，文本和内嵌数据不会变成可执行脚本。\n\n## 兼容性原则\n\n一个好的扩展应尽量保持：\n\n- 一条 Python 命令完成构建；\n- 最终仍可生成自包含 HTML；\n- 默认离线、无遥测、无网络依赖；\n- 源文件只读，批复旁路导出；\n- 中文默认界面与英文国际化文件保持对应；\n- 新能力有示例、文档和回归测试。\n\n先守住这些性质，再增加技术层次。这个项目的价值不在于使用了多少框架，而在于它把本地文档、人工判断和 AI 后续处理连接成了一个可靠的小闭环。\n"}, {"id": "chapter-013", "title": "Local Markdown/TXT Review Reader", "file_name": "README.md", "relative_path": "README.md", "path": "README.md", "folder": "", "path_segments": [], "prefix": "README", "ext": ".md", "word_count": 869, "modified_time": "2026-07-02T03:02:14", "content_html": "\u003ch1\u003eLocal Markdown/TXT Review Reader\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003eA small local-first reader for reviewing folders of Markdown and TXT files.\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003eThe default demo UI is Chinese (\u003ccode\u003elocale: zh-CN\u003c/code\u003e). English is available as an internationalized config through \u003ccode\u003eworkspace.en.config.md\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003eIt builds one self-contained \u003ccode\u003ereader.html\u003c/code\u003e that can be opened in a browser. The reader supports search, filtered navigation, adjustable layout, dark mode, and a local review board that exports grouped \u003ccode\u003ereview.md\u003c/code\u003e.\u003c/p\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003eRequirements: Python 3.10 or newer. The core reader uses only the Python standard library and does not require \u003ccode\u003epip\u003c/code\u003e, npm, or a frontend framework.\u003c/p\u003e\n\u003ch2\u003eQuick Start\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003eEnglish UI example:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.en.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003eOpen:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003eOptional local preview:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython serve_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003eBuild a reader for the project documentation:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003eOpen:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/project-docs.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eOnline Demos\u003c/h2\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003eGitHub Pages demos are available here:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003eChinese basic demo: \u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003eEnglish basic demo: \u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003eChinese project docs demo: \u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003eEnglish project docs demo: \u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"15\" data-block-type=\"paragraph\"\u003eThe same browser-ready demo files are also checked into \u003ccode\u003eexamples/generated/\u003c/code\u003e:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/basic-reader.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/basic-reader.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/project-docs.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/project-docs.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eWhat It Does\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003eReads \u003ccode\u003e.md\u003c/code\u003e and \u003ccode\u003e.txt\u003c/code\u003e files from a configured folder.\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003eBuilds a single self-contained HTML reader.\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003eKeeps source files read-only.\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003eLets you search title, file path, and content.\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003eNavigates within the current filtered result set.\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003eSupports font size, reading width, theme, and draggable side panel widths.\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003eSupports configurable TXT paragraph mode.\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003eSupports configurable UI labels.\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003eLets you select text or a paragraph and add review notes.\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003eSaves review notes in \u003ccode\u003elocalStorage\u003c/code\u003e.\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003eExports grouped \u003ccode\u003ereview.md\u003c/code\u003e.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eExpected Workflow\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003ecreate or collect files from any workflow\n  -\u0026gt; build reader.html with this script\n  -\u0026gt; read, filter, and review locally\n  -\u0026gt; copy or download review.md\n  -\u0026gt; send review.md to AI or use it as a manual checklist\n  -\u0026gt; let AI or the user edit source files outside the reader\n  -\u0026gt; build reader.html again to inspect the revised result\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"31\" data-block-type=\"paragraph\"\u003eThe reader itself does not call AI and does not modify source files. It creates a side-channel review file that is easy for AI tools or humans to process.\u003c/p\u003e\n\u003ch2\u003eEmbed in Another Project\u003c/h2\u003e\n\u003cp data-block-index=\"32\" data-block-type=\"paragraph\"\u003eThis repository can be used as a complete demo, but the core tool is intentionally small enough to copy into another project.\u003c/p\u003e\n\u003cp data-block-index=\"33\" data-block-type=\"paragraph\"\u003eFor a minimal integration, copy:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"34\" data-block-type=\"list-item\"\u003e\u003ccode\u003ebuild_reader.py\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"35\" data-block-type=\"list-item\"\u003ea \u003ccode\u003eworkspace.config.md\u003c/code\u003e adapted to your folder\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"36\" data-block-type=\"paragraph\"\u003eOptional pieces:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e\u003ccode\u003eserve_reader.py\u003c/code\u003e for local preview\u003c/li\u003e\u003cli data-block-index=\"38\" data-block-type=\"list-item\"\u003e\u003ccode\u003etools/convert_docs.py\u003c/code\u003e if you need the DOCX conversion path\u003c/li\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003e\u003ccode\u003etests/smoke_test.py\u003c/code\u003e if you want regression checks\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"40\" data-block-type=\"paragraph\"\u003eThe host project can keep its own documents, AI outputs, drafts, or review files. The reader only needs a configured source folder and an output path.\u003c/p\u003e\n\u003cp data-block-index=\"41\" data-block-type=\"paragraph\"\u003eRecommended embedded flow:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eyour project files\n  -\u0026gt; build_reader.py\n  -\u0026gt; local reader.html\n  -\u0026gt; human review\n  -\u0026gt; review.md\n  -\u0026gt; AI-assisted edits outside the reader\n  -\u0026gt; rebuild reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eWhat It Does Not Do\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"42\" data-block-type=\"list-item\"\u003eIt does not call AI APIs.\u003c/li\u003e\u003cli data-block-index=\"43\" data-block-type=\"list-item\"\u003eIt does not edit source files from the browser.\u003c/li\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003eIt does not merge AI results.\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003eIt does not require React, Vue, npm, or a frontend build chain.\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003eIt does not parse Office/PDF files in the browser.\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003eOptional Converters\u003c/h2\u003e\n\u003cp data-block-index=\"47\" data-block-type=\"paragraph\"\u003eThe core reader intentionally accepts Markdown and TXT only.\u003c/p\u003e\n\u003cp data-block-index=\"48\" data-block-type=\"paragraph\"\u003eFor non-Markdown sources, use an optional converter first:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003esource document -\u0026gt; converter -\u0026gt; md/txt -\u0026gt; build_reader.py -\u0026gt; reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"49\" data-block-type=\"paragraph\"\u003eCurrent confidence levels:\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"50\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.docx\u003c/code\u003e: recommended optional conversion path.\u003c/li\u003e\u003cli data-block-index=\"51\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.doc\u003c/code\u003e / \u003ccode\u003e.rtf\u003c/code\u003e / \u003ccode\u003e.pdf\u003c/code\u003e / \u003ccode\u003e.epub\u003c/code\u003e: future directions, not current commitments.\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003eCurrent converter command:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/convert_docs.py examples/conversion-fixtures/source -o examples/conversion-fixtures/converted\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003eDevelopment\u003c/h2\u003e\n\u003cp data-block-index=\"53\" data-block-type=\"paragraph\"\u003eRun the smoke test before changing or publishing the project:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tests/smoke_test.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"54\" data-block-type=\"paragraph\"\u003eRefresh checked-in demo HTML files:\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/build_demos.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"55\" data-block-type=\"paragraph\"\u003eRoutine files under \u003ccode\u003eoutput/\u003c/code\u003e are local build outputs and should stay uncommitted. Public demo HTML belongs in \u003ccode\u003eexamples/generated/\u003c/code\u003e.\u003c/p\u003e\n\u003ch2\u003eSafety\u003c/h2\u003e\n\u003cp data-block-index=\"56\" data-block-type=\"paragraph\"\u003eThe generated HTML contains the source text. Do not share \u003ccode\u003ereader.html\u003c/code\u003e publicly if the source files contain sensitive information.\u003c/p\u003e\n\u003cp data-block-index=\"57\" data-block-type=\"paragraph\"\u003eThe browser reader does not write back to source files.\u003c/p\u003e\n\u003cp data-block-index=\"58\" data-block-type=\"paragraph\"\u003eThe project includes protections such as disabled Markdown links, escaped TXT rendering, script-safe embedded JSON, and restricted image data URLs. Even so, do not package Markdown/TXT files from unknown sources, and do not run optional converters on unknown Office documents. Review unfamiliar text files in a plain text editor first.\u003c/p\u003e\n\u003ch2\u003eLicense\u003c/h2\u003e\n\u003cp data-block-index=\"59\" data-block-type=\"paragraph\"\u003eMIT License. See \u003ccode\u003eLICENSE\u003c/code\u003e.\u003c/p\u003e\n\u003ch2\u003eMore Documentation\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"60\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/01-project-status.en.md\u003c/code\u003e / \u003ccode\u003edocs/01-project-status.zh-CN.md\u003c/code\u003e: project status, boundaries, and non-goals.\u003c/li\u003e\u003cli data-block-index=\"61\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/02-release-checklist.en.md\u003c/code\u003e / \u003ccode\u003edocs/02-release-checklist.zh-CN.md\u003c/code\u003e: release checks and test coverage.\u003c/li\u003e\u003cli data-block-index=\"62\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/03-customization-guide.en.md\u003c/code\u003e / \u003ccode\u003edocs/03-customization-guide.zh-CN.md\u003c/code\u003e: customization guide for contributors.\u003c/li\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/04-user-manual.en.md\u003c/code\u003e / \u003ccode\u003edocs/04-user-manual.zh-CN.md\u003c/code\u003e: user manual, shortcuts, review board, and export flow.\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/05-security-notes.en.md\u003c/code\u003e / \u003ccode\u003edocs/05-security-notes.zh-CN.md\u003c/code\u003e: security model, protections, and unsafe input guidance.\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/06-developer-guide.en.md\u003c/code\u003e / \u003ccode\u003edocs/06-developer-guide.zh-CN.md\u003c/code\u003e: code architecture, extension order, framework guidance, and regression requirements.\u003c/li\u003e\u003c/ul\u003e", "content_text": "# Local Markdown/TXT Review Reader\n\nA small local-first reader for reviewing folders of Markdown and TXT files.\n\nThe default demo UI is Chinese (`locale: zh-CN`). English is available as an internationalized config through `workspace.en.config.md`.\n\nIt builds one self-contained `reader.html` that can be opened in a browser. The reader supports search, filtered navigation, adjustable layout, dark mode, and a local review board that exports grouped `review.md`.\n\nRequirements: Python 3.10 or newer. The core reader uses only the Python standard library and does not require `pip`, npm, or a frontend framework.\n\n## Quick Start\n\n```powershell\npython build_reader.py workspace.config.md\n```\n\nEnglish UI example:\n\n```powershell\npython build_reader.py workspace.en.config.md\n```\n\nOpen:\n\n```text\noutput/reader.html\n```\n\nOptional local preview:\n\n```powershell\npython serve_reader.py\n```\n\nBuild a reader for the project documentation:\n\n```powershell\npython build_reader.py workspace.docs.config.md\n```\n\nOpen:\n\n```text\noutput/project-docs.html\n```\n\n## Online Demos\n\nGitHub Pages demos are available here:\n\n- Chinese basic demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html`\n- English basic demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html`\n- Chinese project docs demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html`\n- English project docs demo: `https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html`\n\nThe same browser-ready demo files are also checked into `examples/generated/`:\n\n- `examples/generated/basic-reader.demo.html`\n- `examples/generated/basic-reader.en.demo.html`\n- `examples/generated/project-docs.demo.html`\n- `examples/generated/project-docs.en.demo.html`\n\n## What It Does\n\n- Reads `.md` and `.txt` files from a configured folder.\n- Builds a single self-contained HTML reader.\n- Keeps source files read-only.\n- Lets you search title, file path, and content.\n- Navigates within the current filtered result set.\n- Supports font size, reading width, theme, and draggable side panel widths.\n- Supports configurable TXT paragraph mode.\n- Supports configurable UI labels.\n- Lets you select text or a paragraph and add review notes.\n- Saves review notes in `localStorage`.\n- Exports grouped `review.md`.\n\n## Expected Workflow\n\n```text\ncreate or collect files from any workflow\n  -\u003e build reader.html with this script\n  -\u003e read, filter, and review locally\n  -\u003e copy or download review.md\n  -\u003e send review.md to AI or use it as a manual checklist\n  -\u003e let AI or the user edit source files outside the reader\n  -\u003e build reader.html again to inspect the revised result\n```\n\nThe reader itself does not call AI and does not modify source files. It creates a side-channel review file that is easy for AI tools or humans to process.\n\n## Embed in Another Project\n\nThis repository can be used as a complete demo, but the core tool is intentionally small enough to copy into another project.\n\nFor a minimal integration, copy:\n\n- `build_reader.py`\n- a `workspace.config.md` adapted to your folder\n\nOptional pieces:\n\n- `serve_reader.py` for local preview\n- `tools/convert_docs.py` if you need the DOCX conversion path\n- `tests/smoke_test.py` if you want regression checks\n\nThe host project can keep its own documents, AI outputs, drafts, or review files. The reader only needs a configured source folder and an output path.\n\nRecommended embedded flow:\n\n```text\nyour project files\n  -\u003e build_reader.py\n  -\u003e local reader.html\n  -\u003e human review\n  -\u003e review.md\n  -\u003e AI-assisted edits outside the reader\n  -\u003e rebuild reader.html\n```\n\n## What It Does Not Do\n\n- It does not call AI APIs.\n- It does not edit source files from the browser.\n- It does not merge AI results.\n- It does not require React, Vue, npm, or a frontend build chain.\n- It does not parse Office/PDF files in the browser.\n\n## Optional Converters\n\nThe core reader intentionally accepts Markdown and TXT only.\n\nFor non-Markdown sources, use an optional converter first:\n\n```text\nsource document -\u003e converter -\u003e md/txt -\u003e build_reader.py -\u003e reader.html\n```\n\nCurrent confidence levels:\n\n- `.docx`: recommended optional conversion path.\n- `.doc` / `.rtf` / `.pdf` / `.epub`: future directions, not current commitments.\n\nCurrent converter command:\n\n```powershell\npython tools/convert_docs.py examples/conversion-fixtures/source -o examples/conversion-fixtures/converted\n```\n\n## Development\n\nRun the smoke test before changing or publishing the project:\n\n```powershell\npython tests/smoke_test.py\n```\n\nRefresh checked-in demo HTML files:\n\n```powershell\npython tools/build_demos.py\n```\n\nRoutine files under `output/` are local build outputs and should stay uncommitted. Public demo HTML belongs in `examples/generated/`.\n\n## Safety\n\nThe generated HTML contains the source text. Do not share `reader.html` publicly if the source files contain sensitive information.\n\nThe browser reader does not write back to source files.\n\nThe project includes protections such as disabled Markdown links, escaped TXT rendering, script-safe embedded JSON, and restricted image data URLs. Even so, do not package Markdown/TXT files from unknown sources, and do not run optional converters on unknown Office documents. Review unfamiliar text files in a plain text editor first.\n\n## License\n\nMIT License. See `LICENSE`.\n\n## More Documentation\n\n- `docs/01-project-status.en.md` / `docs/01-project-status.zh-CN.md`: project status, boundaries, and non-goals.\n- `docs/02-release-checklist.en.md` / `docs/02-release-checklist.zh-CN.md`: release checks and test coverage.\n- `docs/03-customization-guide.en.md` / `docs/03-customization-guide.zh-CN.md`: customization guide for contributors.\n- `docs/04-user-manual.en.md` / `docs/04-user-manual.zh-CN.md`: user manual, shortcuts, review board, and export flow.\n- `docs/05-security-notes.en.md` / `docs/05-security-notes.zh-CN.md`: security model, protections, and unsafe input guidance.\n- `docs/06-developer-guide.en.md` / `docs/06-developer-guide.zh-CN.md`: code architecture, extension order, framework guidance, and regression requirements.\n"}, {"id": "chapter-014", "title": "本地 Markdown/TXT 审阅阅读器", "file_name": "README.zh-CN.md", "relative_path": "README.zh-CN.md", "path": "README.zh-CN.md", "folder": "", "path_segments": [], "prefix": "README.zh", "ext": ".md", "word_count": 1329, "modified_time": "2026-07-02T03:04:12", "content_html": "\u003ch1\u003e本地 Markdown/TXT 审阅阅读器\u003c/h1\u003e\n\u003cp data-block-index=\"1\" data-block-type=\"paragraph\"\u003e一个本地优先的小工具，用来把一个文件夹里的 Markdown/TXT 文件打包成可阅读、可筛选、可批复的单文件 HTML。\u003c/p\u003e\n\u003cp data-block-index=\"2\" data-block-type=\"paragraph\"\u003e它会生成一个自包含的 \u003ccode\u003ereader.html\u003c/code\u003e，可直接在浏览器中打开。阅读器支持搜索、筛选后翻页、布局调整、深色模式，以及可导出 \u003ccode\u003ereview.md\u003c/code\u003e 的本地审阅板。\u003c/p\u003e\n\u003cp data-block-index=\"3\" data-block-type=\"paragraph\"\u003e运行要求：Python 3.10 或更高版本。核心阅读器只使用 Python 标准库，不需要安装 \u003ccode\u003epip\u003c/code\u003e 依赖、npm 或前端框架。\u003c/p\u003e\n\u003cp data-block-index=\"4\" data-block-type=\"paragraph\"\u003e默认界面为中文：\u003ccode\u003elocale: zh-CN\u003c/code\u003e。英文作为国际化配置保留在 \u003ccode\u003eworkspace.en.config.md\u003c/code\u003e。\u003c/p\u003e\n\u003ch2\u003e快速开始\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"5\" data-block-type=\"paragraph\"\u003e英文界面示例：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.en.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"6\" data-block-type=\"paragraph\"\u003e打开：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"7\" data-block-type=\"paragraph\"\u003e可选本地预览：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython serve_reader.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"8\" data-block-type=\"paragraph\"\u003e生成说明文档阅读器：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython build_reader.py workspace.docs.config.md\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"9\" data-block-type=\"paragraph\"\u003e打开：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003eoutput/project-docs.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e在线 Demo\u003c/h2\u003e\n\u003cp data-block-index=\"10\" data-block-type=\"paragraph\"\u003eGitHub Pages 已启用，可以直接打开：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"11\" data-block-type=\"list-item\"\u003e中文基础 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"12\" data-block-type=\"list-item\"\u003e英文基础 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"13\" data-block-type=\"list-item\"\u003e中文项目文档 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"14\" data-block-type=\"list-item\"\u003e英文项目文档 demo：\u003ccode\u003ehttps://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"15\" data-block-type=\"paragraph\"\u003e同样的浏览器可打开示例也提交在 \u003ccode\u003eexamples/generated/\u003c/code\u003e：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"16\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/basic-reader.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"17\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/basic-reader.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"18\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/project-docs.demo.html\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"19\" data-block-type=\"list-item\"\u003e\u003ccode\u003eexamples/generated/project-docs.en.demo.html\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e功能\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"20\" data-block-type=\"list-item\"\u003e读取配置目录下的 \u003ccode\u003e.md\u003c/code\u003e 和 \u003ccode\u003e.txt\u003c/code\u003e 文件。\u003c/li\u003e\u003cli data-block-index=\"21\" data-block-type=\"list-item\"\u003e生成单文件 \u003ccode\u003ereader.html\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"22\" data-block-type=\"list-item\"\u003e不修改源文件。\u003c/li\u003e\u003cli data-block-index=\"23\" data-block-type=\"list-item\"\u003e支持标题、路径、文件名、正文搜索。\u003c/li\u003e\u003cli data-block-index=\"24\" data-block-type=\"list-item\"\u003e上一篇/下一篇基于当前筛选结果跳转。\u003c/li\u003e\u003cli data-block-index=\"25\" data-block-type=\"list-item\"\u003e支持字体大小、阅读宽度、主题、左右栏拖拽宽度。\u003c/li\u003e\u003cli data-block-index=\"26\" data-block-type=\"list-item\"\u003e支持目录栏和审阅板折叠。\u003c/li\u003e\u003cli data-block-index=\"27\" data-block-type=\"list-item\"\u003e支持 TXT 段落模式配置。\u003c/li\u003e\u003cli data-block-index=\"28\" data-block-type=\"list-item\"\u003e支持 UI 文案 labels 配置。\u003c/li\u003e\u003cli data-block-index=\"29\" data-block-type=\"list-item\"\u003e支持选中文本或段落加入批复。\u003c/li\u003e\u003cli data-block-index=\"30\" data-block-type=\"list-item\"\u003e批复保存到 \u003ccode\u003elocalStorage\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"31\" data-block-type=\"list-item\"\u003e支持按文件分组导出 \u003ccode\u003ereview.md\u003c/code\u003e。\u003c/li\u003e\u003cli data-block-index=\"32\" data-block-type=\"list-item\"\u003eMarkdown 链接默认禁用，避免启用不可信链接。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e预期工作流\u003c/h2\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e从任意工作流生成或收集文件\n  -\u0026gt; 用本脚本打包 reader.html\n  -\u0026gt; 本地阅读、筛选、审阅\n  -\u0026gt; 复制或下载 review.md\n  -\u0026gt; 把 review.md 交给 AI，或作为人工修改清单\n  -\u0026gt; 由 AI 或用户在阅读器外修改源文件\n  -\u0026gt; 再次打包 reader.html，检查修改后的整体结果\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"33\" data-block-type=\"paragraph\"\u003e阅读器本身不调用 AI，也不修改源文件。它只生成一份旁路批复文件，方便 AI 或人工继续处理。\u003c/p\u003e\n\u003ch2\u003e嵌入到其他项目\u003c/h2\u003e\n\u003cp data-block-index=\"34\" data-block-type=\"paragraph\"\u003e这个仓库可以作为完整 demo 使用，但核心工具刻意保持很小，适合被复制到别人的项目里。\u003c/p\u003e\n\u003cp data-block-index=\"35\" data-block-type=\"paragraph\"\u003e最小集成只需要复制：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"36\" data-block-type=\"list-item\"\u003e\u003ccode\u003ebuild_reader.py\u003c/code\u003e\u003c/li\u003e\u003cli data-block-index=\"37\" data-block-type=\"list-item\"\u003e按目标项目修改后的 \u003ccode\u003eworkspace.config.md\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"38\" data-block-type=\"paragraph\"\u003e可选复制：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"39\" data-block-type=\"list-item\"\u003e\u003ccode\u003eserve_reader.py\u003c/code\u003e：用于本地预览。\u003c/li\u003e\u003cli data-block-index=\"40\" data-block-type=\"list-item\"\u003e\u003ccode\u003etools/convert_docs.py\u003c/code\u003e：用于 DOCX 转换路径。\u003c/li\u003e\u003cli data-block-index=\"41\" data-block-type=\"list-item\"\u003e\u003ccode\u003etests/smoke_test.py\u003c/code\u003e：用于回归检查。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"42\" data-block-type=\"paragraph\"\u003e宿主项目可以保留自己的文档、AI 输出、草稿或批复文件。阅读器只需要一个配置好的源目录和输出路径。\u003c/p\u003e\n\u003cp data-block-index=\"43\" data-block-type=\"paragraph\"\u003e推荐嵌入流程：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e你的项目文件\n  -\u0026gt; build_reader.py\n  -\u0026gt; 本地 reader.html\n  -\u0026gt; 人工审阅\n  -\u0026gt; review.md\n  -\u0026gt; AI 在阅读器外辅助修改\n  -\u0026gt; 重新打包 reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e不做什么\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"44\" data-block-type=\"list-item\"\u003e不调用 AI API。\u003c/li\u003e\u003cli data-block-index=\"45\" data-block-type=\"list-item\"\u003e不从浏览器写回源文件。\u003c/li\u003e\u003cli data-block-index=\"46\" data-block-type=\"list-item\"\u003e不自动合并 AI 返回结果。\u003c/li\u003e\u003cli data-block-index=\"47\" data-block-type=\"list-item\"\u003e不依赖 React、Vue、npm 或前端构建链。\u003c/li\u003e\u003cli data-block-index=\"48\" data-block-type=\"list-item\"\u003e不在浏览器中直接解析 Office/PDF。\u003c/li\u003e\u003cli data-block-index=\"49\" data-block-type=\"list-item\"\u003e不承诺复杂 DOCX 版式完全还原。\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e可选转换器\u003c/h2\u003e\n\u003cp data-block-index=\"50\" data-block-type=\"paragraph\"\u003e核心阅读器只接受 Markdown/TXT。\u003c/p\u003e\n\u003cp data-block-index=\"51\" data-block-type=\"paragraph\"\u003e如果要处理非 Markdown/TXT 的来源，建议先通过可选转换器转成 Markdown/TXT：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"text\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003etext\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003e原始文档 -\u0026gt; 转换器 -\u0026gt; md/txt -\u0026gt; build_reader.py -\u0026gt; reader.html\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"52\" data-block-type=\"paragraph\"\u003e当前质量分级：\u003c/p\u003e\n\u003cul\u003e\u003cli data-block-index=\"53\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.docx\u003c/code\u003e：当前推荐的可选转换路径。\u003c/li\u003e\u003cli data-block-index=\"54\" data-block-type=\"list-item\"\u003e\u003ccode\u003e.doc\u003c/code\u003e / \u003ccode\u003e.rtf\u003c/code\u003e / \u003ccode\u003e.pdf\u003c/code\u003e / \u003ccode\u003e.epub\u003c/code\u003e：后续扩展方向，不是当前承诺。\u003c/li\u003e\u003c/ul\u003e\n\u003cp data-block-index=\"55\" data-block-type=\"paragraph\"\u003e当前转换器命令：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/convert_docs.py examples/conversion-fixtures/source -o examples/conversion-fixtures/converted\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2\u003e开发与发布维护\u003c/h2\u003e\n\u003cp data-block-index=\"56\" data-block-type=\"paragraph\"\u003e修改或发布前运行 smoke test：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tests/smoke_test.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"57\" data-block-type=\"paragraph\"\u003e刷新已提交的 demo HTML：\u003c/p\u003e\n\u003cdiv class=\"code-block\" data-language=\"powershell\"\u003e\u003cdiv class=\"code-tools\"\u003e\u003cspan\u003epowershell\u003c/span\u003e\u003cbutton type=\"button\" class=\"copy-code\"\u003e复制代码\u003c/button\u003e\u003c/div\u003e\u003cpre\u003e\u003ccode\u003epython tools/build_demos.py\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp data-block-index=\"58\" data-block-type=\"paragraph\"\u003e\u003ccode\u003eoutput/\u003c/code\u003e 是日常本地构建目录，不应提交。公开 demo HTML 放在 \u003ccode\u003eexamples/generated/\u003c/code\u003e。\u003c/p\u003e\n\u003ch2\u003e安全提示\u003c/h2\u003e\n\u003cp data-block-index=\"59\" data-block-type=\"paragraph\"\u003e生成的 HTML 会包含源文件正文。如果源文件有敏感内容，不要公开分享生成的 \u003ccode\u003ereader.html\u003c/code\u003e。\u003c/p\u003e\n\u003cp data-block-index=\"60\" data-block-type=\"paragraph\"\u003e浏览器阅读器不会写回源文件。\u003c/p\u003e\n\u003cp data-block-index=\"61\" data-block-type=\"paragraph\"\u003e项目已经做了链接禁用、TXT 转义渲染、嵌入 JSON 安全转义、图片 data URL 限制等防护。即便如此，也不建议打包来路不明的 Markdown/TXT 文件，也不建议对来路不明的 Office 文档运行可选转换器。陌生文本文件请先用普通文本编辑器检查。\u003c/p\u003e\n\u003ch2\u003e许可证\u003c/h2\u003e\n\u003cp data-block-index=\"62\" data-block-type=\"paragraph\"\u003eMIT License。详见 \u003ccode\u003eLICENSE\u003c/code\u003e。\u003c/p\u003e\n\u003ch2\u003e更多文档\u003c/h2\u003e\n\u003cul\u003e\u003cli data-block-index=\"63\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/01-project-status.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/01-project-status.en.md\u003c/code\u003e：项目状态、边界和非目标。\u003c/li\u003e\u003cli data-block-index=\"64\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/02-release-checklist.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/02-release-checklist.en.md\u003c/code\u003e：发布检查和测试覆盖。\u003c/li\u003e\u003cli data-block-index=\"65\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/03-customization-guide.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/03-customization-guide.en.md\u003c/code\u003e：面向后来者的自定义指南。\u003c/li\u003e\u003cli data-block-index=\"66\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/04-user-manual.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/04-user-manual.en.md\u003c/code\u003e：用户手册、快捷键、审阅板和导出流程。\u003c/li\u003e\u003cli data-block-index=\"67\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/05-security-notes.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/05-security-notes.en.md\u003c/code\u003e：安全模型、已有防护和不可信输入说明。\u003c/li\u003e\u003cli data-block-index=\"68\" data-block-type=\"list-item\"\u003e\u003ccode\u003edocs/06-developer-guide.zh-CN.md\u003c/code\u003e / \u003ccode\u003edocs/06-developer-guide.en.md\u003c/code\u003e：代码架构、扩展顺序、框架判断和回归要求。\u003c/li\u003e\u003c/ul\u003e", "content_text": "# 本地 Markdown/TXT 审阅阅读器\n\n一个本地优先的小工具，用来把一个文件夹里的 Markdown/TXT 文件打包成可阅读、可筛选、可批复的单文件 HTML。\n\n它会生成一个自包含的 `reader.html`，可直接在浏览器中打开。阅读器支持搜索、筛选后翻页、布局调整、深色模式，以及可导出 `review.md` 的本地审阅板。\n\n运行要求：Python 3.10 或更高版本。核心阅读器只使用 Python 标准库，不需要安装 `pip` 依赖、npm 或前端框架。\n\n默认界面为中文：`locale: zh-CN`。英文作为国际化配置保留在 `workspace.en.config.md`。\n\n## 快速开始\n\n```powershell\npython build_reader.py workspace.config.md\n```\n\n英文界面示例：\n\n```powershell\npython build_reader.py workspace.en.config.md\n```\n\n打开：\n\n```text\noutput/reader.html\n```\n\n可选本地预览：\n\n```powershell\npython serve_reader.py\n```\n\n生成说明文档阅读器：\n\n```powershell\npython build_reader.py workspace.docs.config.md\n```\n\n打开：\n\n```text\noutput/project-docs.html\n```\n\n## 在线 Demo\n\nGitHub Pages 已启用，可以直接打开：\n\n- 中文基础 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.demo.html`\n- 英文基础 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/basic-reader.en.demo.html`\n- 中文项目文档 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.demo.html`\n- 英文项目文档 demo：`https://simonye2026.github.io/folder-book-review-reader/examples/generated/project-docs.en.demo.html`\n\n同样的浏览器可打开示例也提交在 `examples/generated/`：\n\n- `examples/generated/basic-reader.demo.html`\n- `examples/generated/basic-reader.en.demo.html`\n- `examples/generated/project-docs.demo.html`\n- `examples/generated/project-docs.en.demo.html`\n\n## 功能\n\n- 读取配置目录下的 `.md` 和 `.txt` 文件。\n- 生成单文件 `reader.html`。\n- 不修改源文件。\n- 支持标题、路径、文件名、正文搜索。\n- 上一篇/下一篇基于当前筛选结果跳转。\n- 支持字体大小、阅读宽度、主题、左右栏拖拽宽度。\n- 支持目录栏和审阅板折叠。\n- 支持 TXT 段落模式配置。\n- 支持 UI 文案 labels 配置。\n- 支持选中文本或段落加入批复。\n- 批复保存到 `localStorage`。\n- 支持按文件分组导出 `review.md`。\n- Markdown 链接默认禁用，避免启用不可信链接。\n\n## 预期工作流\n\n```text\n从任意工作流生成或收集文件\n  -\u003e 用本脚本打包 reader.html\n  -\u003e 本地阅读、筛选、审阅\n  -\u003e 复制或下载 review.md\n  -\u003e 把 review.md 交给 AI，或作为人工修改清单\n  -\u003e 由 AI 或用户在阅读器外修改源文件\n  -\u003e 再次打包 reader.html，检查修改后的整体结果\n```\n\n阅读器本身不调用 AI，也不修改源文件。它只生成一份旁路批复文件，方便 AI 或人工继续处理。\n\n## 嵌入到其他项目\n\n这个仓库可以作为完整 demo 使用，但核心工具刻意保持很小，适合被复制到别人的项目里。\n\n最小集成只需要复制：\n\n- `build_reader.py`\n- 按目标项目修改后的 `workspace.config.md`\n\n可选复制：\n\n- `serve_reader.py`：用于本地预览。\n- `tools/convert_docs.py`：用于 DOCX 转换路径。\n- `tests/smoke_test.py`：用于回归检查。\n\n宿主项目可以保留自己的文档、AI 输出、草稿或批复文件。阅读器只需要一个配置好的源目录和输出路径。\n\n推荐嵌入流程：\n\n```text\n你的项目文件\n  -\u003e build_reader.py\n  -\u003e 本地 reader.html\n  -\u003e 人工审阅\n  -\u003e review.md\n  -\u003e AI 在阅读器外辅助修改\n  -\u003e 重新打包 reader.html\n```\n\n## 不做什么\n\n- 不调用 AI API。\n- 不从浏览器写回源文件。\n- 不自动合并 AI 返回结果。\n- 不依赖 React、Vue、npm 或前端构建链。\n- 不在浏览器中直接解析 Office/PDF。\n- 不承诺复杂 DOCX 版式完全还原。\n\n## 可选转换器\n\n核心阅读器只接受 Markdown/TXT。\n\n如果要处理非 Markdown/TXT 的来源，建议先通过可选转换器转成 Markdown/TXT：\n\n```text\n原始文档 -\u003e 转换器 -\u003e md/txt -\u003e build_reader.py -\u003e reader.html\n```\n\n当前质量分级：\n\n- `.docx`：当前推荐的可选转换路径。\n- `.doc` / `.rtf` / `.pdf` / `.epub`：后续扩展方向，不是当前承诺。\n\n当前转换器命令：\n\n```powershell\npython tools/convert_docs.py examples/conversion-fixtures/source -o examples/conversion-fixtures/converted\n```\n\n## 开发与发布维护\n\n修改或发布前运行 smoke test：\n\n```powershell\npython tests/smoke_test.py\n```\n\n刷新已提交的 demo HTML：\n\n```powershell\npython tools/build_demos.py\n```\n\n`output/` 是日常本地构建目录，不应提交。公开 demo HTML 放在 `examples/generated/`。\n\n## 安全提示\n\n生成的 HTML 会包含源文件正文。如果源文件有敏感内容，不要公开分享生成的 `reader.html`。\n\n浏览器阅读器不会写回源文件。\n\n项目已经做了链接禁用、TXT 转义渲染、嵌入 JSON 安全转义、图片 data URL 限制等防护。即便如此，也不建议打包来路不明的 Markdown/TXT 文件，也不建议对来路不明的 Office 文档运行可选转换器。陌生文本文件请先用普通文本编辑器检查。\n\n## 许可证\n\nMIT License。详见 `LICENSE`。\n\n## 更多文档\n\n- `docs/01-project-status.zh-CN.md` / `docs/01-project-status.en.md`：项目状态、边界和非目标。\n- `docs/02-release-checklist.zh-CN.md` / `docs/02-release-checklist.en.md`：发布检查和测试覆盖。\n- `docs/03-customization-guide.zh-CN.md` / `docs/03-customization-guide.en.md`：面向后来者的自定义指南。\n- `docs/04-user-manual.zh-CN.md` / `docs/04-user-manual.en.md`：用户手册、快捷键、审阅板和导出流程。\n- `docs/05-security-notes.zh-CN.md` / `docs/05-security-notes.en.md`：安全模型、已有防护和不可信输入说明。\n- `docs/06-developer-guide.zh-CN.md` / `docs/06-developer-guide.en.md`：代码架构、扩展顺序、框架判断和回归要求。\n"}]};
